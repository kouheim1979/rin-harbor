<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>リンハーバー</title>
<meta name="theme-color" content="#48c7ff">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 20% 0,#fff7bf 0 110px,transparent 111px),linear-gradient(180deg,#bff4ff 0%,#effbff 48%,#ffe8b7 100%);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}
iframe{width:100%;height:100dvh;border:0;display:block;background:transparent}
noscript{display:block;padding:24px;font-weight:900;color:#273947}
</style>
</head>
<body>
<iframe id="gameFrame" src="game-core.html" title="リンハーバー"></iframe>
<noscript>リンハーバーを遊ぶにはJavaScriptを有効にしてください。</noscript>
<script>
'use strict';

const DESIGN_CSS = `
:root{
  --ink:#263947;
  --deep:#075984;
  --pink:#ff6fa8;
  --pink2:#ffafd0;
  --sea:#45caff;
  --sea2:#0799d6;
  --mint:#69e49b;
  --sand:#ffe2a8;
  --card:rgba(255,255,255,.88);
  --line:rgba(7,89,132,.14);
  --shadow:0 16px 36px rgba(13,103,151,.18);
}
html.rinDesignV2,
.rinDesignV2 body{
  background:
    radial-gradient(circle at 15% 8%,rgba(255,231,111,.95) 0 52px,rgba(255,231,111,.2) 53px 82px,transparent 83px),
    radial-gradient(circle at 84% 12%,rgba(255,255,255,.85) 0 22px,transparent 23px),
    linear-gradient(180deg,#b9f3ff 0%,#eafcff 48%,#ffe8b0 100%) !important;
  color:var(--ink);
}
.rinDesignV2 body:before{
  height:260px!important;
  bottom:-95px!important;
  background:
    radial-gradient(ellipse at 20% 15%,rgba(255,255,255,.6) 0 12px,transparent 13px),
    radial-gradient(ellipse at 60% 8%,rgba(255,255,255,.45) 0 16px,transparent 17px),
    repeating-linear-gradient(135deg,rgba(255,255,255,.18) 0 12px,transparent 13px 28px),
    linear-gradient(180deg,#5ad6ff 0%,#0f98d6 100%)!important;
  opacity:.95;
}
.rinDesignV2 body:after{
  content:"";
  position:fixed;
  inset:auto -40px 64px -40px;
  height:78px;
  pointer-events:none;
  background:
    linear-gradient(90deg,transparent 0 5%,rgba(139,92,44,.45) 5.4% 6.4%,transparent 6.8% 16%,rgba(139,92,44,.45) 16.4% 17.4%,transparent 17.8% 100%),
    linear-gradient(180deg,transparent 0 44%,rgba(255,255,255,.5) 45% 54%,transparent 55%),
    repeating-linear-gradient(90deg,rgba(161,104,48,.36) 0 24px,rgba(123,77,38,.34) 25px 46px);
  border-radius:32px;
  opacity:.36;
  z-index:-1;
}
.rinDesignV2 .app{
  max-width:760px;
  padding:10px 10px calc(82px + env(safe-area-inset-bottom,0px))!important;
}
.rinDesignV2 .card,
.rinDesignV2 .gameHead,
.rinDesignV2 .orderStrip,
.rinDesignV2 .controls,
.rinDesignV2 .msg{
  background:var(--card)!important;
  border:2px solid rgba(255,255,255,.78)!important;
  box-shadow:var(--shadow)!important;
  backdrop-filter:blur(10px);
}
.rinDesignV2 .card{border-radius:28px!important;padding:14px!important}
.rinDesignV2 .title{
  color:#1d536b;
  letter-spacing:.02em;
  text-shadow:0 3px 0 rgba(255,255,255,.95),0 10px 24px rgba(6,84,126,.16)!important;
}
.rinDesignV2 .sub{
  color:#54727d!important;
  line-height:1.45;
}
.rinDesignV2 button{
  border:0!important;
  min-height:42px;
  background:linear-gradient(180deg,#fff 0%,#e9f9ff 100%)!important;
  box-shadow:0 5px 0 rgba(6,78,116,.13),0 10px 22px rgba(6,78,116,.12)!important;
  transition:transform .12s ease,filter .12s ease,box-shadow .12s ease;
}
.rinDesignV2 button:active{transform:translateY(3px) scale(.985)!important;box-shadow:0 2px 0 rgba(6,78,116,.12)!important}
.rinDesignV2 .primary{background:linear-gradient(180deg,#ffb7d3 0%,#ff69a4 100%)!important;color:#fff!important}
.rinDesignV2 .good{background:linear-gradient(180deg,#a5f8ba 0%,#4fd67d 100%)!important;color:#17472a!important}
.rinDesignV2 .warn{background:linear-gradient(180deg,#fff0a6 0%,#ffc94f 100%)!important;color:#5b3b00!important}
.rinDesignV2 .danger{background:linear-gradient(180deg,#ffa8b2 0%,#ff6171 100%)!important;color:#fff!important}
.rinDesignV2 .off{background:linear-gradient(180deg,#eceff1 0%,#c9d2d8 100%)!important;color:#41535c!important}
.rinDesignV2 .movie{
  border-radius:32px!important;
  border:3px solid rgba(255,255,255,.82)!important;
  background:
    radial-gradient(circle at 76% 18%,#ffdf62 0 36px,rgba(255,223,98,.28) 37px 58px,transparent 59px),
    linear-gradient(180deg,#b5f4ff 0 46%,#69d7ff 47% 66%,#ffd78e 67% 100%)!important;
  box-shadow:inset 0 -16px 26px rgba(0,137,193,.11),var(--shadow)!important;
}
.rinDesignV2 .movie:before{
  content:"";
  position:absolute;
  left:-10%;
  right:-10%;
  bottom:25%;
  height:64px;
  background:repeating-radial-gradient(ellipse at 20px 16px,rgba(255,255,255,.68) 0 12px,transparent 13px 36px);
  animation:rinFoam 5.5s linear infinite;
  opacity:.7;
}
.rinDesignV2 .movie:after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:26%;
  background:linear-gradient(180deg,rgba(255,210,139,.3),rgba(255,210,139,.92));
}
.rinDesignV2 .movie.small{height:118px!important;min-height:118px!important}
.rinDesignV2 .sun{box-shadow:0 0 0 16px rgba(255,218,97,.25),0 0 34px rgba(255,188,54,.34)!important}
.rinDesignV2 .cloud{filter:drop-shadow(0 8px 6px rgba(35,119,160,.12))}
.rinDesignV2 .boat{filter:drop-shadow(0 8px 8px rgba(21,89,126,.25))}
.rinDesignV2 .rin{z-index:2;filter:drop-shadow(0 12px 11px rgba(80,30,60,.25))!important}
.rinDesignV2 .caption{
  z-index:3;
  background:rgba(255,255,255,.9)!important;
  border:2px solid rgba(255,255,255,.9)!important;
  color:#35606f;
  box-shadow:0 8px 20px rgba(7,89,132,.14);
}
.rinDesignV2 .startPanel{z-index:4}
.rinDesignV2 .stats{gap:8px!important}
.rinDesignV2 .stat{
  background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(239,251,255,.88))!important;
  border:1px solid rgba(255,255,255,.82)!important;
  border-radius:18px!important;
  box-shadow:0 8px 16px rgba(6,88,128,.1)!important;
}
.rinDesignV2 .stat small{color:#6a8490!important}
.rinDesignV2 .stat b{color:#175a7a}
.rinDesignV2 .homeGrid{gap:11px!important}
.rinDesignV2 .menuCard{
  position:relative;
  overflow:hidden;
  min-height:136px!important;
  border:1px solid rgba(255,255,255,.76)!important;
  background:linear-gradient(145deg,rgba(255,255,255,.96),rgba(231,249,255,.9))!important;
  box-shadow:0 12px 24px rgba(7,89,132,.13)!important;
}
.rinDesignV2 .menuCard:before{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:7px;
  background:linear-gradient(90deg,#ff86b8,#ffd365,#69e49b,#45caff);
}
.rinDesignV2 .menuIcon{filter:drop-shadow(0 6px 6px rgba(7,89,132,.16))}
.rinDesignV2 .gamePage{gap:8px!important}
.rinDesignV2 .gameHead{
  border-radius:26px!important;
  padding:10px!important;
}
.rinDesignV2 .gameTitle{color:#1d536b;text-shadow:0 2px #fff}
.rinDesignV2 .miniStats{gap:6px!important}
.rinDesignV2 .miniStats span{
  background:rgba(255,255,255,.78)!important;
  border:1px solid rgba(255,255,255,.82)!important;
  color:#23576c;
  box-shadow:0 4px 10px rgba(7,89,132,.08);
}
.rinDesignV2 .board{
  width:min(calc(100vw - 28px),calc(100dvh - 316px),540px)!important;
  height:min(calc(100vw - 28px),calc(100dvh - 316px),540px)!important;
  gap:7px!important;
  padding:7px;
  border-radius:28px;
  background:rgba(255,255,255,.38);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.5),0 14px 30px rgba(6,87,128,.12);
}
.rinDesignV2 .cell{
  border:0!important;
  border-radius:19px!important;
  background:linear-gradient(180deg,#fff 0%,#ecfbff 100%)!important;
  box-shadow:inset 0 -5px 0 rgba(12,95,140,.08),0 7px 13px rgba(7,89,132,.13)!important;
}
.rinDesignV2 .cell.empty{
  background:rgba(255,255,255,.38)!important;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.55)!important;
}
.rinDesignV2 .cell.gen{
  background:linear-gradient(180deg,#fff6be 0%,#ffd86c 100%)!important;
  box-shadow:inset 0 -6px 0 rgba(163,109,0,.1),0 8px 14px rgba(117,83,0,.16)!important;
}
.rinDesignV2 .cell.sel{
  box-shadow:inset 0 0 0 4px rgba(255,111,168,.78),0 0 0 5px rgba(255,111,168,.18),0 10px 16px rgba(7,89,132,.13)!important;
}
.rinDesignV2 .cell.dropTarget{
  box-shadow:inset 0 0 0 4px rgba(79,214,125,.85),0 0 0 5px rgba(79,214,125,.18),0 10px 16px rgba(7,89,132,.13)!important;
}
.rinDesignV2 .em{font-size:clamp(24px,7vw,42px)!important}
.rinDesignV2 .nm{color:#385969}
.rinDesignV2 .lv,
.rinDesignV2 .tap{
  border:0!important;
  background:rgba(255,255,255,.88)!important;
  box-shadow:0 2px 6px rgba(7,89,132,.1);
}
.rinDesignV2 .orderStrip{
  border-radius:25px!important;
  grid-template-columns:1fr 112px!important;
}
.rinDesignV2 .wantMini span{
  background:rgba(255,255,255,.72)!important;
  border:1px solid rgba(255,255,255,.75)!important;
}
.rinDesignV2 .wantMini .ok{background:#e7fff0!important;color:#11652b!important}
.rinDesignV2 .controls{
  border-radius:24px!important;
  scrollbar-width:none;
}
.rinDesignV2 .controls::-webkit-scrollbar{display:none}
.rinDesignV2 .msg{
  border-radius:20px!important;
  color:#385969;
}
.rinDesignV2 .order,
.rinDesignV2 .storyCard,
.rinDesignV2 .book{
  border:1px solid rgba(255,255,255,.78)!important;
  background:rgba(255,255,255,.88)!important;
  box-shadow:0 10px 20px rgba(7,89,132,.11)!important;
}
.rinDesignV2 .storyCard{border-radius:22px!important}
.rinDesignV2 .storyCard.locked{opacity:.66}
.rinDesignV2 .book{border-radius:20px!important}
.rinDesignV2 .be{font-size:34px!important}
.rinDesignV2 .nav{
  border:2px solid rgba(255,255,255,.8)!important;
  background:rgba(255,255,255,.84)!important;
  box-shadow:0 18px 36px rgba(7,89,132,.22)!important;
  backdrop-filter:blur(12px);
}
.rinDesignV2 .nav button.active{
  background:linear-gradient(180deg,#ffafd0 0%,#ff6fa8 100%)!important;
  color:#fff!important;
}
.rinDesignV2 .dragGhost{
  border:0!important;
  background:rgba(255,255,255,.92)!important;
  box-shadow:0 18px 34px rgba(7,89,132,.28)!important;
}
.rinDesignV2 .repairEvent{
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,rgba(255,255,255,.96),rgba(229,248,255,.9));
  border:1px solid rgba(255,255,255,.78);
  border-radius:24px;
  padding:12px;
  box-shadow:0 12px 24px rgba(7,89,132,.13);
  display:grid;
  grid-template-columns:112px 1fr;
  gap:11px;
  min-height:170px;
}
.rinDesignV2 .repairEvent:before{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:7px;
  background:linear-gradient(90deg,#45caff,#69e49b,#ffd365,#ff86b8);
}
.rinDesignV2 .repairInfo{
  display:flex;
  flex-direction:column;
  gap:7px;
  min-width:0;
}
.rinDesignV2 .repairInfo b{font-size:16px;color:#1d536b}
.rinDesignV2 .repairInfo small{font-weight:1000;color:#627d88}
.rinDesignV2 .repairBtn{width:100%;padding:9px 7px;font-size:14px}
.rinDesignV2 .repairComplete{background:linear-gradient(180deg,#ffb7d3,#ff69a4)!important;color:white!important}
.rinDesignV2 .repairVisual{
  position:relative;
  overflow:hidden;
  min-height:150px;
  border-radius:21px;
  background:linear-gradient(180deg,#9beaff 0%,#4ec9f2 58%,#0b91ce 100%);
  box-shadow:inset 0 -14px 22px rgba(0,96,143,.16);
}
.rinDesignV2 .repairVisual:before{
  content:"";
  position:absolute;
  left:-10%;
  right:-10%;
  bottom:0;
  height:42%;
  background:
    repeating-radial-gradient(ellipse at 22px 7px,rgba(255,255,255,.54) 0 8px,transparent 9px 28px),
    linear-gradient(180deg,rgba(76,213,246,.68),rgba(0,121,196,.9));
  animation:rinFoam 5s linear infinite;
  z-index:1;
}
.rinDesignV2 .repairVisual.stage0{filter:saturate(.82)}
.rinDesignV2 .repairVisual.stage4,
.rinDesignV2 .repairVisual.stage5{filter:saturate(1.12) brightness(1.04)}
.rinDesignV2 .repairStageImg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  z-index:0;
}
.rinDesignV2 .repairFallbackShip{
  position:absolute;
  left:50%;
  top:54%;
  transform:translate(-50%,-50%);
  font-size:58px;
  filter:drop-shadow(0 9px 8px rgba(0,50,90,.28));
  z-index:2;
}
.rinDesignV2 .repairMsg{
  position:absolute;
  left:9px;
  right:9px;
  bottom:9px;
  z-index:3;
  background:rgba(255,255,255,.9);
  border:1px solid rgba(255,255,255,.82);
  border-radius:15px;
  padding:7px 9px;
  color:#385969;
  font-weight:1000;
  font-size:12px;
  line-height:1.3;
  box-shadow:0 6px 12px rgba(7,89,132,.1);
}
@keyframes rinFoam{to{transform:translateX(44px)}}
@media(max-width:540px){
  .rinDesignV2 .app{padding-left:8px!important;padding-right:8px!important}
  .rinDesignV2 .stats{grid-template-columns:repeat(2,1fr)!important}
  .rinDesignV2 .homeGrid{grid-template-columns:1fr 1fr!important}
  .rinDesignV2 .menuCard{min-height:132px!important;padding:13px!important}
  .rinDesignV2 .movie{min-height:248px!important}
  .rinDesignV2 .movie.small{height:108px!important;min-height:108px!important}
  .rinDesignV2 .board{
    width:min(calc(100vw - 22px),calc(100dvh - 316px),520px)!important;
    height:min(calc(100vw - 22px),calc(100dvh - 316px),520px)!important;
    gap:5px!important;
    padding:5px;
  }
  .rinDesignV2 .cell{border-radius:15px!important}
  .rinDesignV2 .orderStrip{grid-template-columns:1fr 104px!important}
  .rinDesignV2 .repairEvent{grid-template-columns:1fr;min-height:auto}
  .rinDesignV2 .repairVisual{min-height:146px}
}
`;

const REPAIR_COSTS=[50,100,200,400,800];
const REPAIR_TITLES=['壊れたリン号','穴をふさぐ','船体を補強する','マストを直す','客室をきれいにする','リン号完成'];
const REPAIR_MESSAGES=['嵐でボロボロになったリン号。','船の穴をふさいだ！','船体が丈夫になった！','マストが直った！','客室がきれいになった！','リン号が完全に復活した！\n新しい冒険に出発だ！'];
const REPAIR_SHIPS=['⛵','⛵','⛵','⛵','🛥️','🚢'];
const MAX_REPAIR=5;
const frame=document.getElementById('gameFrame');

function run(code){return frame.contentWindow.eval(code)}
function installDesign(){
  const doc=frame.contentDocument;
  if(!doc||!doc.head)return;
  if(!doc.getElementById('rinDesignV2Style')){
    const style=doc.createElement('style');
    style.id='rinDesignV2Style';
    style.textContent=DESIGN_CSS;
    doc.head.appendChild(style);
  }
  doc.documentElement.classList.add('rinDesignV2');
  const caption=doc.querySelector('#screenOpening .caption');
  if(caption)caption.textContent='リン号をなおして、港をもっとかわいくしよう';
  const sub=doc.querySelector('#screenOpening .sub');
  if(sub)sub.textContent='材料は無限。合成して、注文を届けて、リン号も直そう。';
}
function getState(){try{return JSON.parse(run('JSON.stringify({coins:S.coins,repair:+S.repair||0})'))}catch(e){return{coins:0,repair:0}}}
function safeRepair(v){return Math.max(0,Math.min(MAX_REPAIR,+v||0))}
function needCost(r){return r>=MAX_REPAIR?0:REPAIR_COSTS[r]}
function repairLabel(s){const r=safeRepair(s.repair);if(r>=MAX_REPAIR)return 'リン号は完成したよ';return '修理 '+r+'/'+MAX_REPAIR+'　必要 '+needCost(r)+'コイン'}
function updateRepairUI(){
  installDesign();
  const doc=frame.contentDocument;
  if(!doc)return;
  const s=getState(),r=safeRepair(s.repair),cost=needCost(r);
  const btn=doc.getElementById('repairShipBtn');
  const title=doc.getElementById('repairStageTitle');
  const sub=doc.getElementById('repairStageSub');
  const visual=doc.getElementById('repairVisual');
  const img=doc.getElementById('repairStageImg');
  const msg=doc.getElementById('repairEventMsg');
  const ship=doc.getElementById('repairFallbackShip');
  if(title)title.textContent=REPAIR_TITLES[r];
  if(sub)sub.textContent=r>=MAX_REPAIR?'完成済み':('必要コイン '+cost+' / 所持 '+s.coins);
  if(msg)msg.textContent=REPAIR_MESSAGES[r];
  if(ship)ship.textContent=REPAIR_SHIPS[r];
  if(visual){visual.className='repairVisual stage'+r;}
  if(img){img.src='assets/repair-stage-'+r+'.png';img.alt=REPAIR_TITLES[r];}
  if(btn){btn.textContent=r>=MAX_REPAIR?'🚢 リン号は完成したよ':'🔧 '+cost+'コインで修理';btn.disabled=r>=MAX_REPAIR;btn.className=r>=MAX_REPAIR?'repairBtn repairComplete':'repairBtn good';}
}
function installRepair(){
  installDesign();
  const w=frame.contentWindow,doc=frame.contentDocument;
  if(!w||!doc||!doc.querySelector)return;
  try{run("S.repair=Math.max(0,Math.min(5,+S.repair||0));saveNow();");}catch(e){}
  const grid=doc.querySelector('.homeGrid');
  if(grid&&!doc.getElementById('repairShipCard')){
    const card=doc.createElement('div');
    card.className='repairEvent';
    card.id='repairShipCard';
    card.innerHTML='<div class="repairInfo"><span class="menuIcon">🔧</span><b>船の修理</b><small id="repairStageTitle">壊れたリン号</small><small id="repairStageSub">必要コイン</small><button id="repairShipBtn" class="repairBtn good">🔧 修理</button></div><div id="repairVisual" class="repairVisual stage0"><img id="repairStageImg" class="repairStageImg" src="assets/repair-stage-0.png" alt="壊れたリン号" onerror="this.style.display=\'none\'"><div id="repairFallbackShip" class="repairFallbackShip">⛵</div><div id="repairEventMsg" class="repairMsg">嵐でボロボロになったリン号。</div></div>';
    grid.appendChild(card);
    const btn=card.querySelector('#repairShipBtn');
    btn.addEventListener('pointerdown',ev=>{ev.preventDefault();repairShip();},{passive:false});
  }
  try{if(!w.__rinRepairPatched){run("window.__rinRepairPatched=true;const __oldNormalize=normalize;normalize=function(){__oldNormalize();S.repair=Math.max(0,Math.min(5,+S.repair||0));};const __oldStatsHtml=statsHtml;statsHtml=function(){return __oldStatsHtml().replace(/<small>注文Lv<\\/small><b>.*?<\\/b>/,'<small>修理</small><b>'+((+S.repair||0))+'/5</b>');};const __oldMiniStats=miniStats;miniStats=function(){return __oldMiniStats().replace(/<span>注文Lv.*?<\\/span>/,'<span>🔧'+((+S.repair||0))+'/5</span>');};");}}
  catch(e){}
  updateRepairUI();
}
function repairShip(){
  try{run("S.repair=Math.max(0,Math.min(5,+S.repair||0));const costs=[50,100,200,400,800];const msgs=['船の穴をふさいだ！','船体が丈夫になった！','マストが直った！','客室がきれいになった！','リン号が完成した！'];if(S.repair>=5){say('リン号が完全に復活した！ 新しい冒険に出発だ！');}else if(S.coins<costs[S.repair]){say('コインが足りないよ');}else{S.coins-=costs[S.repair];S.repair++;say(msgs[S.repair-1]);saveNow();renderAll();}");
  }catch(e){}
  updateRepairUI();
}
frame.addEventListener('load',()=>{setTimeout(installRepair,200);setInterval(updateRepairUI,900);});
</script>
</body>
</html>
