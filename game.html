<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>リンハーバー</title>
<meta name="theme-color" content="#48c7ff">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#ddf8ff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}iframe{width:100%;height:100dvh;border:0;display:block;background:#ddf8ff}noscript{display:block;padding:24px;font-weight:900;color:#273947}
</style>
</head>
<body>
<iframe id="gameFrame" src="game-core.html" title="リンハーバー"></iframe>
<noscript>リンハーバーを遊ぶにはJavaScriptを有効にしてください。</noscript>
<script>
'use strict';
const frame=document.getElementById('gameFrame');
const REPAIR_COSTS=[50,100,200,400,800];
const REPAIR_TITLES=['壊れたリン号','穴をふさぐ','船体を補強する','マストを直す','客室をきれいにする','リン号完成'];
const REPAIR_MESSAGES=['嵐でボロボロになったリン号。','船の穴をふさいだ！','船体が丈夫になった！','マストが直った！','客室がきれいになった！','リン号が完全に復活した！\n新しい冒険に出発だ！'];
const REPAIR_SHIPS=['⛵','⛵','⛵','⛵','🛥️','🚢'];
const STORY_IMAGES=[
  {title:'壊れたリン号',text:'嵐でボロボロになったリン号。ここから物語が始まる。',base:'assets/repair-stage-0'},
  {title:'穴をふさぐ',text:'船の穴をふさいだ。リン号が少しずつ元気を取り戻す。',base:'assets/repair-stage-1'},
  {title:'船体を補強する',text:'船体が丈夫になった。港のみんなも安心して見守っている。',base:'assets/repair-stage-2'},
  {title:'マストを直す',text:'マストが直って、また風を受けられるようになった。',base:'assets/repair-stage-3'},
  {title:'客室をきれいにする',text:'客室も整って、みんなを迎える準備が進む。',base:'assets/repair-stage-4'},
  {title:'リン号完成',text:'リン号が完全に復活。新しい冒険に出発だ！',base:'assets/repair-stage-5'}
];
const MAX_REPAIR=5;
const CSS=`.repairEvent{background:#fff;border:2px solid rgba(39,57,71,.14);border-radius:22px;padding:10px;box-shadow:0 8px 18px #12608018;display:grid;grid-template-columns:112px 1fr;gap:10px;min-height:168px}.repairInfo{display:flex;flex-direction:column;gap:6px}.repairInfo b{font-size:15px}.repairInfo small{font-weight:900;color:#58707c}.repairVisual{position:relative;border-radius:18px;overflow:hidden;min-height:150px;background:linear-gradient(180deg,#7fb7d8,#37aebf)}.repairStageImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}.repairFallbackShip{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);font-size:56px;filter:drop-shadow(0 8px 8px rgba(0,50,90,.3))}.repairMsg{position:absolute;left:8px;right:8px;bottom:8px;background:#ffffffe8;border:1px solid #0001;border-radius:13px;padding:6px 8px;font-weight:1000;font-size:12px}.repairBtn{width:100%;padding:9px 7px}.repairComplete{background:linear-gradient(#ff9dc5,#ff70aa)!important;color:white!important}.heroOpeningImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0!important;pointer-events:none}.heroHide{display:none!important}#screenOpening .movie{position:relative!important;overflow:hidden!important;background:#bff4ff!important}#screenOpening .caption{position:absolute!important;left:12px!important;right:auto!important;top:12px!important;bottom:auto!important;z-index:4!important}#screenOpening .startPanel{position:absolute!important;left:50%!important;right:auto!important;top:auto!important;bottom:calc(18px + env(safe-area-inset-bottom,0px))!important;transform:translateX(-50%)!important;z-index:5!important;width:min(92%,540px)!important;display:flex!important;gap:10px!important;flex-wrap:wrap!important;justify-content:center!important;align-items:center!important}#screenOpening .startPanel button{min-height:46px!important;white-space:nowrap!important}.storyAlbumBox{margin:0 0 10px 0;padding:12px;border-radius:18px;background:rgba(255,255,255,.9);box-shadow:0 10px 20px rgba(7,89,132,.11);border:1px solid rgba(255,255,255,.78)}.storyAlbumRow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.storyViewer{position:fixed;inset:0;background:rgba(20,35,48,.74);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px}.storyViewerPanel{width:min(720px,100%);max-height:100%;overflow:auto;background:#fff;border-radius:24px;padding:14px;box-shadow:0 24px 48px rgba(0,0,0,.25)}.storyViewerHead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}.storyViewerImg{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:18px;background:#eef7fb;display:block}.storyViewerText{margin-top:10px;color:#385969;line-height:1.5;font-weight:800}.storyViewerThumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.storyThumb{padding:6px;border-radius:13px;overflow:hidden;text-align:left}.storyThumb img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px;display:block;background:#eef7fb}.storyThumb div{font-size:12px;margin-top:6px;font-weight:900}.assetFail{display:flex!important;align-items:center!important;justify-content:center!important;background:linear-gradient(#f8fdff,#e9f7ff)!important;color:#35566a!important;font-weight:1000!important;text-align:center!important}@media(max-width:540px){.repairEvent{grid-template-columns:1fr;min-height:auto}.repairVisual{min-height:145px}.repairFallbackShip{font-size:50px}.storyViewerThumbs{grid-template-columns:repeat(2,1fr)}}`;
function run(code){return frame.contentWindow.eval(code)}
function installCss(){const d=frame.contentDocument;if(!d||!d.head)return;if(!d.getElementById('repairCss')){const s=d.createElement('style');s.id='repairCss';s.textContent=CSS;d.head.appendChild(s)}}
function fixOpeningLayout(){const d=frame.contentDocument;if(!d)return;const movie=d.querySelector('#screenOpening .movie'),panel=d.querySelector('#screenOpening .startPanel'),caption=d.querySelector('#screenOpening .caption');if(movie){movie.style.position='relative';movie.style.overflow='hidden'}if(caption){Object.assign(caption.style,{position:'absolute',left:'12px',right:'auto',top:'12px',bottom:'auto',zIndex:'4'})}if(panel){Object.assign(panel.style,{position:'absolute',left:'50%',right:'auto',top:'auto',bottom:'calc(18px + env(safe-area-inset-bottom,0px))',transform:'translateX(-50%)',zIndex:'5',width:'min(92%,540px)',display:'flex',gap:'10px',flexWrap:'wrap',justifyContent:'center',alignItems:'center'});panel.querySelectorAll('button').forEach(b=>{b.style.minHeight='46px';b.style.whiteSpace='nowrap'})}}
function showAssetFallback(img,label){img.removeAttribute('src');img.style.display='none';const p=img.parentElement;if(!p)return;let f=p.querySelector('.assetFail');if(!f){f=frame.contentDocument.createElement('div');f.className='assetFail';f.style.position=getComputedStyle(p).position==='static'?'relative':'absolute';f.style.inset='0';f.style.borderRadius='inherit';p.appendChild(f)}f.textContent='⛵ '+(label||'画像を読み込み中')}
function clearAssetFallback(img){const f=img.parentElement&&img.parentElement.querySelector('.assetFail');if(f)f.remove()}
function setBestAsset(img,base,label){const tries=[base+'.webp',base+'.png',base+'.jpg',base+'.jpeg'];let i=0;img.style.display='none';const next=()=>{if(i>=tries.length){showAssetFallback(img,label);return}clearAssetFallback(img);img.src=tries[i++]};img.onload=()=>{if(!img.naturalWidth||!img.naturalHeight||img.naturalWidth<40||img.naturalHeight<40){next();return}clearAssetFallback(img);img.style.display='block'};img.onerror=next;next()}
function installHero(){installCss();fixOpeningLayout();const d=frame.contentDocument;if(!d)return;const movie=d.querySelector('#screenOpening .movie');if(!movie)return;const originals=[...movie.querySelectorAll('.sun,.cloud,.boat,.rin')];const showOriginals=()=>originals.forEach(e=>e.classList.remove('heroHide'));const hideOriginals=()=>originals.forEach(e=>e.classList.add('heroHide'));if(d.getElementById('heroOpeningImg')){fixOpeningLayout();return}const img=d.createElement('img');img.id='heroOpeningImg';img.className='heroOpeningImg';img.alt='リンハーバー';img.style.display='none';const tries=['assets/hero-opening.webp','assets/hero-opening.png','assets/hero-opening.jpg','assets/hero-opening.jpeg'];let i=0;const next=()=>{if(i>=tries.length){img.style.display='none';showOriginals();fixOpeningLayout();return}img.src=tries[i++]};img.onload=()=>{if(!img.naturalWidth||!img.naturalHeight){next();return}img.style.display='block';hideOriginals();fixOpeningLayout()};img.onerror=next;movie.insertBefore(img,movie.firstChild);showOriginals();fixOpeningLayout();next()}
function safeRepair(v){return Math.max(0,Math.min(MAX_REPAIR,+v||0))}
function needCost(r){return r>=MAX_REPAIR?0:REPAIR_COSTS[r]}
function getState(){try{return JSON.parse(run('JSON.stringify({coins:S.coins,repair:+S.repair||0})'))}catch(e){return{coins:0,repair:0}}}
function unlockedStoryImages(){const r=safeRepair(getState().repair);return STORY_IMAGES.slice(0,Math.min(STORY_IMAGES.length,r+1))}
function ensureStoryViewer(d){if(d.getElementById('storyViewer'))return;const v=d.createElement('div');v.id='storyViewer';v.className='storyViewer';v.innerHTML='<div class="storyViewerPanel"><div class="storyViewerHead"><b id="storyViewerTitle">思い出アルバム</b><button id="storyViewerClose" class="off">閉じる</button></div><img id="storyViewerImg" class="storyViewerImg" alt=""><div id="storyViewerText" class="storyViewerText"></div><div id="storyViewerThumbs" class="storyViewerThumbs"></div></div>';d.body.appendChild(v);d.getElementById('storyViewerClose').addEventListener('click',()=>{v.style.display='none'});v.addEventListener('click',e=>{if(e.target===v)v.style.display='none'})}
function openStoryViewer(index=0){const d=frame.contentDocument;if(!d)return;ensureStoryViewer(d);const items=unlockedStoryImages();const v=d.getElementById('storyViewer'),title=d.getElementById('storyViewerTitle'),img=d.getElementById('storyViewerImg'),text=d.getElementById('storyViewerText'),thumbs=d.getElementById('storyViewerThumbs');const render=i=>{const item=items[i]||items[0];if(!item)return;title.textContent=item.title;text.textContent=item.text;setBestAsset(img,item.base,item.title);thumbs.innerHTML='';items.forEach((it,idx)=>{const b=d.createElement('button');b.className='storyThumb '+(idx===i?'primary':'');b.innerHTML='<img alt="'+it.title+'"><div>'+it.title+'</div>';setBestAsset(b.querySelector('img'),it.base,it.title);b.addEventListener('click',()=>render(idx));thumbs.appendChild(b)})};v.style.display='flex';render(index)}
function installStoryGallery(){installCss();const d=frame.contentDocument;if(!d)return;const first=d.querySelector('.storyCard');if(!first)return;if(d.getElementById('storyGalleryLauncher'))return;const box=d.createElement('div');box.className='storyAlbumBox';box.innerHTML='<div class="storyAlbumRow"><div><b>思い出アルバム</b><br><small>これまでの修理イラストを振り返れます</small></div><button id="storyGalleryLauncher" class="primary">🖼 ひらく</button></div>';first.parentNode.insertBefore(box,first);box.querySelector('#storyGalleryLauncher').addEventListener('click',()=>openStoryViewer(0))}
function setImg(img,r){img.alt=REPAIR_TITLES[r];setBestAsset(img,'assets/repair-stage-'+r,REPAIR_TITLES[r])}
function updateRepairUI(){installCss();installHero();fixOpeningLayout();installStoryGallery();const d=frame.contentDocument;if(!d)return;const s=getState(),r=safeRepair(s.repair),cost=needCost(r);const btn=d.getElementById('repairShipBtn'),title=d.getElementById('repairStageTitle'),sub=d.getElementById('repairStageSub'),img=d.getElementById('repairStageImg'),msg=d.getElementById('repairEventMsg'),ship=d.getElementById('repairFallbackShip');if(title)title.textContent=REPAIR_TITLES[r];if(sub)sub.textContent=r>=MAX_REPAIR?'完成済み':'必要コイン '+cost+' / 所持 '+s.coins;if(msg)msg.textContent=REPAIR_MESSAGES[r];if(ship)ship.textContent=REPAIR_SHIPS[r];if(img&&img.dataset.stage!==String(r)){img.dataset.stage=String(r);setImg(img,r)}if(btn){btn.textContent=r>=MAX_REPAIR?'🚢 リン号は完成したよ':'🔧 '+cost+'コインで修理';btn.disabled=r>=MAX_REPAIR;btn.className=r>=MAX_REPAIR?'repairBtn repairComplete':'repairBtn good'}}
function installRepair(){installCss();installHero();fixOpeningLayout();installStoryGallery();const w=frame.contentWindow,d=frame.contentDocument;if(!w||!d||!d.querySelector)return;try{run('S.repair=Math.max(0,Math.min(5,+S.repair||0));saveNow();')}catch(e){}const grid=d.querySelector('.homeGrid');if(grid&&!d.getElementById('repairShipCard')){const card=d.createElement('div');card.className='repairEvent';card.id='repairShipCard';card.innerHTML='<div class="repairInfo"><span class="menuIcon">🔧</span><b>船の修理</b><small id="repairStageTitle">壊れたリン号</small><small id="repairStageSub">必要コイン</small><button id="repairShipBtn" class="repairBtn good">🔧 修理</button></div><div id="repairVisual" class="repairVisual"><img id="repairStageImg" class="repairStageImg" alt="壊れたリン号"><div id="repairFallbackShip" class="repairFallbackShip">⛵</div><div id="repairEventMsg" class="repairMsg">嵐でボロボロになったリン号。</div></div>';grid.appendChild(card);card.querySelector('#repairShipBtn').addEventListener('pointerdown',ev=>{ev.preventDefault();repairShip()},{passive:false});setBestAsset(card.querySelector('#repairStageImg'),'assets/repair-stage-0','壊れたリン号')}try{if(!w.__rinRepairPatched){run("window.__rinRepairPatched=true;const __oldNormalize=normalize;normalize=function(){__oldNormalize();S.repair=Math.max(0,Math.min(5,+S.repair||0));};const __oldStatsHtml=statsHtml;statsHtml=function(){return __oldStatsHtml().replace(/<small>注文Lv<\\/small><b>.*?<\\/b>/,'<small>修理</small><b>'+((+S.repair||0))+'/5</b>');};const __oldMiniStats=miniStats;miniStats=function(){return __oldMiniStats().replace(/<span>注文Lv.*?<\\/span>/,'<span>🔧'+((+S.repair||0))+'/5</span>');};")}}catch(e){}updateRepairUI()}
function repairShip(){try{run("S.repair=Math.max(0,Math.min(5,+S.repair||0));const costs=[50,100,200,400,800];const msgs=['船の穴をふさいだ！','船体が丈夫になった！','マストが直った！','客室がきれいになった！','リン号が完成した！'];if(S.repair>=5){say('リン号が完全に復活した！ 新しい冒険に出発だ！');}else if(S.coins<costs[S.repair]){say('コインが足りないよ');}else{S.coins-=costs[S.repair];S.repair++;say(msgs[S.repair-1]);saveNow();renderAll();}")}catch(e){}updateRepairUI()}
frame.addEventListener('load',()=>{setTimeout(()=>{installRepair();installHero();fixOpeningLayout();installStoryGallery()},200);setInterval(updateRepairUI,900)});
</script>
</body>
</html>
