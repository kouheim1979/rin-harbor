<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>リンハーバー</title>
<meta name="theme-color" content="#48c7ff">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#ddf8ff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}iframe{width:100%;height:100dvh;border:0;display:block;background:#ddf8ff}noscript{display:block;padding:24px;font-weight:900;color:#273947}
</style>
</head>
<body>
<iframe id="gameFrame" src="game-core.html" title="リンハーバー"></iframe>
<noscript>リンハーバーを遊ぶにはJavaScriptを有効にしてください。</noscript>
<script>
'use strict';
const frame=document.getElementById('gameFrame');
const REPAIR_COSTS=[50,100,200,400,800];
const REPAIR_TITLES=['壊れたリン号','穴をふさぐ','船体を補強する','マストを直す','客室をきれいにする','リン号完成'];
const REPAIR_MESSAGES=['嵐でボロボロになったリン号。','船の穴をふさいだ！','船体が丈夫になった！','マストが直った！','客室がきれいになった！','リン号が完全に復活した！\n新しい冒険に出発だ！'];
const REPAIR_SHIPS=['⛵','⛵','⛵','⛵','🛥️','🚢'];
const MAX_REPAIR=5;
const CSS=`.repairEvent{background:#fff;border:2px solid rgba(39,57,71,.14);border-radius:22px;padding:10px;box-shadow:0 8px 18px #12608018;display:grid;grid-template-columns:112px 1fr;gap:10px;min-height:168px}.repairInfo{display:flex;flex-direction:column;gap:6px}.repairInfo b{font-size:15px}.repairInfo small{font-weight:900;color:#58707c}.repairVisual{position:relative;border-radius:18px;overflow:hidden;min-height:150px;background:linear-gradient(180deg,#7fb7d8,#37aebf)}.repairStageImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}.repairFallbackShip{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);font-size:56px;filter:drop-shadow(0 8px 8px rgba(0,50,90,.3))}.repairMsg{position:absolute;left:8px;right:8px;bottom:8px;background:#ffffffe8;border:1px solid #0001;border-radius:13px;padding:6px 8px;font-weight:1000;font-size:12px}.repairBtn{width:100%;padding:9px 7px}.repairComplete{background:linear-gradient(#ff9dc5,#ff70aa)!important;color:white!important}.heroOpeningImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}.heroHide{display:none!important}#screenOpening .movie{position:relative;overflow:hidden;background:#bff4ff!important}#screenOpening .caption,#screenOpening .startPanel{position:relative;z-index:2}@media(max-width:540px){.repairEvent{grid-template-columns:1fr;min-height:auto}.repairVisual{min-height:145px}.repairFallbackShip{font-size:50px}}`;
function run(code){return frame.contentWindow.eval(code)}
function installCss(){const d=frame.contentDocument;if(!d||!d.head)return;if(!d.getElementById('repairCss')){const s=d.createElement('style');s.id='repairCss';s.textContent=CSS;d.head.appendChild(s)}}
function installHero(){installCss();const d=frame.contentDocument;if(!d)return;const movie=d.querySelector('#screenOpening .movie');if(!movie)return;movie.querySelectorAll('.sun,.cloud,.boat,.rin').forEach(e=>e.classList.add('heroHide'));if(!d.getElementById('heroOpeningImg')){const img=d.createElement('img');img.id='heroOpeningImg';img.className='heroOpeningImg';img.alt='リンハーバー';img.src='assets/hero-opening.webp';img.onerror=function(){this.style.display='none'};movie.insertBefore(img,movie.firstChild)}}
function safeRepair(v){return Math.max(0,Math.min(MAX_REPAIR,+v||0))}
function needCost(r){return r>=MAX_REPAIR?0:REPAIR_COSTS[r]}
function getState(){try{return JSON.parse(run('JSON.stringify({coins:S.coins,repair:+S.repair||0})'))}catch(e){return{coins:0,repair:0}}}
function setImg(img,r){img.style.display='block';img.dataset.try='webp';img.src='assets/repair-stage-'+r+'.webp';img.onerror=function(){if(this.dataset.try==='webp'){this.dataset.try='png';this.src='assets/repair-stage-'+r+'.png'}else{this.style.display='none'}}}
function updateRepairUI(){installCss();installHero();const d=frame.contentDocument;if(!d)return;const s=getState(),r=safeRepair(s.repair),cost=needCost(r);const btn=d.getElementById('repairShipBtn'),title=d.getElementById('repairStageTitle'),sub=d.getElementById('repairStageSub'),img=d.getElementById('repairStageImg'),msg=d.getElementById('repairEventMsg'),ship=d.getElementById('repairFallbackShip');if(title)title.textContent=REPAIR_TITLES[r];if(sub)sub.textContent=r>=MAX_REPAIR?'完成済み':'必要コイン '+cost+' / 所持 '+s.coins;if(msg)msg.textContent=REPAIR_MESSAGES[r];if(ship)ship.textContent=REPAIR_SHIPS[r];if(img&&img.dataset.stage!==String(r)){img.dataset.stage=String(r);img.alt=REPAIR_TITLES[r];setImg(img,r)}if(btn){btn.textContent=r>=MAX_REPAIR?'🚢 リン号は完成したよ':'🔧 '+cost+'コインで修理';btn.disabled=r>=MAX_REPAIR;btn.className=r>=MAX_REPAIR?'repairBtn repairComplete':'repairBtn good'}}
function installRepair(){installCss();installHero();const w=frame.contentWindow,d=frame.contentDocument;if(!w||!d||!d.querySelector)return;try{run('S.repair=Math.max(0,Math.min(5,+S.repair||0));saveNow();')}catch(e){}const grid=d.querySelector('.homeGrid');if(grid&&!d.getElementById('repairShipCard')){const card=d.createElement('div');card.className='repairEvent';card.id='repairShipCard';card.innerHTML='<div class="repairInfo"><span class="menuIcon">🔧</span><b>船の修理</b><small id="repairStageTitle">壊れたリン号</small><small id="repairStageSub">必要コイン</small><button id="repairShipBtn" class="repairBtn good">🔧 修理</button></div><div id="repairVisual" class="repairVisual"><img id="repairStageImg" class="repairStageImg" alt="壊れたリン号"><div id="repairFallbackShip" class="repairFallbackShip">⛵</div><div id="repairEventMsg" class="repairMsg">嵐でボロボロになったリン号。</div></div>';grid.appendChild(card);card.querySelector('#repairShipBtn').addEventListener('pointerdown',ev=>{ev.preventDefault();repairShip()},{passive:false})}try{if(!w.__rinRepairPatched){run("window.__rinRepairPatched=true;const __oldNormalize=normalize;normalize=function(){__oldNormalize();S.repair=Math.max(0,Math.min(5,+S.repair||0));};const __oldStatsHtml=statsHtml;statsHtml=function(){return __oldStatsHtml().replace(/<small>注文Lv<\\/small><b>.*?<\\/b>/,'<small>修理</small><b>'+((+S.repair||0))+'/5</b>');};const __oldMiniStats=miniStats;miniStats=function(){return __oldMiniStats().replace(/<span>注文Lv.*?<\\/span>/,'<span>🔧'+((+S.repair||0))+'/5</span>');};")}}catch(e){}updateRepairUI()}
function repairShip(){try{run("S.repair=Math.max(0,Math.min(5,+S.repair||0));const costs=[50,100,200,400,800];const msgs=['船の穴をふさいだ！','船体が丈夫になった！','マストが直った！','客室がきれいになった！','リン号が完成した！'];if(S.repair>=5){say('リン号が完全に復活した！ 新しい冒険に出発だ！');}else if(S.coins<costs[S.repair]){say('コインが足りないよ');}else{S.coins-=costs[S.repair];S.repair++;say(msgs[S.repair-1]);saveNow();renderAll();}")}catch(e){}updateRepairUI()}
frame.addEventListener('load',()=>{setTimeout(()=>{installRepair();installHero()},200);setInterval(updateRepairUI,900)});
</script>
</body>
</html>
