<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>リンハーバー</title>
<meta name="theme-color" content="#63d5ff">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#ddf8ff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}iframe{width:100%;height:100dvh;border:0;display:block;background:#ddf8ff}
</style>
</head>
<body>
<iframe id="gameFrame" src="game-core.html" title="リンハーバー"></iframe>
<script>
'use strict';
const REPAIR_COSTS=[50,100,200,400,800];
const MAX_REPAIR=5;
const frame=document.getElementById('gameFrame');
function run(code){return frame.contentWindow.eval(code)}
function getState(){try{return JSON.parse(run('JSON.stringify({coins:S.coins,repair:+S.repair||0})'))}catch(e){return{coins:0,repair:0}}}
function repairLabel(s){if(s.repair>=MAX_REPAIR)return 'リン号は完成したよ';return '修理 '+s.repair+'/'+MAX_REPAIR+'　必要 '+REPAIR_COSTS[s.repair]+'コイン'}
function updateRepairButton(){const doc=frame.contentDocument;if(!doc)return;const btn=doc.getElementById('repairShipBtn');if(!btn)return;const s=getState();btn.textContent='🔧 '+repairLabel(s);btn.disabled=s.repair>=MAX_REPAIR;btn.className=s.repair>=MAX_REPAIR?'off':'good'}
function installRepair(){const w=frame.contentWindow,doc=frame.contentDocument;if(!w||!doc||!doc.querySelector)return;try{run("S.repair=Math.max(0,Math.min(5,+S.repair||0));saveNow();");}catch(e){}
 const grid=doc.querySelector('.homeGrid');if(grid&&!doc.getElementById('repairShipCard')){const card=doc.createElement('div');card.className='menuCard';card.id='repairShipCard';card.innerHTML='<span class="menuIcon">🔧</span><b>船の修理</b><span>コインの使い道</span><button id="repairShipBtn" class="good">🔧 修理</button>';grid.appendChild(card);const btn=card.querySelector('#repairShipBtn');btn.addEventListener('pointerdown',ev=>{ev.preventDefault();repairShip();},{passive:false});}
 try{if(!w.__rinRepairPatched){run("window.__rinRepairPatched=true;const __oldNormalize=normalize;normalize=function(){__oldNormalize();S.repair=Math.max(0,Math.min(5,+S.repair||0));};const __oldStatsHtml=statsHtml;statsHtml=function(){return __oldStatsHtml().replace(/<small>注文Lv<\\/small><b>.*?<\\/b>/,'<small>修理</small><b>'+((+S.repair||0))+'/5</b>');};const __oldMiniStats=miniStats;miniStats=function(){return __oldMiniStats().replace(/<span>注文Lv.*?<\\/span>/,'<span>🔧'+((+S.repair||0))+'/5</span>');};");}}
 catch(e){}
 updateRepairButton();}
function repairShip(){try{run("S.repair=Math.max(0,Math.min(5,+S.repair||0));const costs=[50,100,200,400,800];if(S.repair>=5){say('リン号は完成したよ');}else if(S.coins<costs[S.repair]){say('コインが足りないよ');}else{S.coins-=costs[S.repair];S.repair++;say('船を修理したよ');saveNow();renderAll();}");}catch(e){}updateRepairButton();}
frame.addEventListener('load',()=>{setTimeout(installRepair,200);setInterval(updateRepairButton,1000);});
</script>
</body>
</html>
