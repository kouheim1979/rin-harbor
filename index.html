<!doctype html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover'><title>リンハーバー</title><style> *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}body{margin:0;font-family:system-ui,-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;color:#263946;background:linear-gradient(#dff8ff,#fff4d8);padding:10px 10px 95px;overflow-x:hidden}body:before{content:'';position:fixed;left:-10%;right:-10%;bottom:-80px;height:230px;background:repeating-radial-gradient(ellipse at 30% 0,rgba(255,255,255,.35) 0 18px,transparent 19px 46px),linear-gradient(#70d6ff,#169bd6);border-radius:50% 50% 0 0;z-index:-1;animation:wave 5s infinite ease-in-out}.app{max-width:1100px;margin:auto}.card{background:rgba(255,255,255,.94);border:3px solid rgba(255,255,255,.9);border-radius:26px;box-shadow:0 15px 32px rgba(30,100,130,.18);padding:14px;margin-bottom:12px}.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}h1{margin:0;font-size:clamp(32px,8vw,56px);text-shadow:0 4px #fff}.sub{font-weight:900;color:#4d6a78}.badge{background:#fff;border:2px solid #ffd2e4;border-radius:999px;padding:8px 12px;font-weight:1000}.movie{height:130px;border-radius:22px;overflow:hidden;position:relative;background:linear-gradient(#bcefff 0 50%,#73d6ff 51% 70%,#ffd08a 71%);border:2px solid #ffffffaa}.sun{position:absolute;right:24px;top:16px;width:42px;height:42px;border-radius:50%;background:#ffda61;box-shadow:0 0 0 12px #ffda6135;animation:pulse 2.5s infinite}.cloud{position:absolute;top:22px;left:10px;font-size:34px;animation:cloud 10s linear infinite}.boat{position:absolute;bottom:30px;left:-80px;font-size:54px;animation:boat 8s linear infinite}.rin{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);font-size:62px;animation:rin 2.3s ease-in-out infinite;filter:drop-shadow(0 8px 7px #8444)}.caption{position:absolute;left:10px;bottom:10px;background:#ffffffe0;border:2px solid #0001;border-radius:999px;padding:7px 10px;font-weight:1000}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}.stat{background:#fff;border:2px solid #0001;border-radius:16px;padding:8px}.stat small{display:block;color:#688;font-weight:900}.stat b{font-size:20px}.layout{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}.board{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.cell{aspect-ratio:1;border:3px solid #0001;border-radius:18px;background:linear-gradient(#fff,#f1fbff);box-shadow:inset 0 -5px #00000008,0 6px 12px #12608016;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}.cell.empty{border-style:dashed;background:#ffffff70}.cell.gen{background:linear-gradient(#fff2bf,#ffdf7b)}.cell.sel{border-color:#ff70aa;box-shadow:0 0 0 4px #ff70aa33}.em{font-size:clamp(26px,7vw,45px);filter:drop-shadow(0 4px 4px #12608022);animation:bob 3s infinite ease-in-out}.nm{font-size:11px;font-weight:1000;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}.lv,.tap{position:absolute;top:4px;border-radius:999px;background:#fff;border:1px solid #0001;font-size:10px;font-weight:1000;padding:3px 5px}.lv{right:4px}.tap{left:4px;color:#9b5b00}.msg,.order,.story,.book,.help{background:#fff;border:2px solid #0001;border-radius:17px;padding:10px;box-shadow:0 6px 14px #12608012}.msg{margin-top:10px;font-weight:900}.btns,.orders{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.orders{display:grid}.order{width:100%}.ot{display:flex;justify-content:space-between;font-weight:1000}.want{display:flex;justify-content:space-between;margin-top:6px;padding:7px;border-radius:12px;background:#f5fbff;font-weight:900}.want.ok{background:#edfff2;color:#11652b}.want.ng{background:#fff3f5;color:#8d2731}button{border:2px solid #0001;border-radius:999px;background:linear-gradient(#fff,#edf8ff);padding:10px 13px;font-weight:1000;font-size:16px;color:#263946;box-shadow:0 5px #0001}button:disabled{opacity:.45}.primary{background:linear-gradient(#ff9bc1,#ff6ca3);color:white}.good{background:linear-gradient(#91f4a9,#55cf78)}.warn{background:linear-gradient(#ffe88f,#ffc84e)}.danger{background:linear-gradient(#ff9ba4,#ff6270);color:white}.collection{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}.book{text-align:center;font-weight:1000}.be{font-size:32px}.quick{position:fixed;left:8px;right:8px;bottom:calc(8px + env(safe-area-inset-bottom,0px));max-width:740px;margin:auto;background:#fffffff2;border:3px solid #ff70aa35;border-radius:23px;box-shadow:0 15px 34px #12608033;padding:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}.quick b{display:block}.quick small{color:#688;font-weight:900}.pop{position:fixed;pointer-events:none;font-size:32px;animation:pop .9s forwards}@keyframes wave{50%{transform:translateY(10px)}}@keyframes cloud{to{transform:translateX(1100px)}}@keyframes boat{to{transform:translateX(1250px)}}@keyframes rin{50%{transform:translate(-50%,-7px)}}@keyframes bob{50%{transform:translateY(-3px)}}@keyframes pulse{50%{transform:scale(1.08)}}@keyframes pop{0%{opacity:0;transform:translate(-50%,-10px)}30%{opacity:1}to{opacity:0;transform:translate(-50%,-80px) scale(1.25)}}@media(max-width:850px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}}@media(max-width:520px){.card{padding:10px}.stats{grid-template-columns:repeat(2,1fr)}.movie{height:112px}.rin{font-size:54px}.nm{display:none}.cell{border-radius:14px}.quick button{min-width:112px}} </style></head><body><div class='app'><header class='card'><div class='top'><div><h1>⚓ リンハーバー</h1><div class='sub'>リンちゃん専用。かわいい港で合成パズル！</div></div><div class='badge'>🌸 RIN ONLY</div></div><div class='movie'><div class='sun'></div><div class='cloud'>☁️</div><div class='boat'>⛵</div><div class='rin'>👧🏻🎀</div><div class='caption'>動画風オープニング</div></div><div class='stats'><div class='stat'><small>エネルギー</small><b id='energy'></b></div><div class='stat'><small>コイン</small><b id='coins'></b></div><div class='stat'><small>星</small><b id='stars'></b></div><div class='stat'><small>レベル</small><b id='level'></b></div><div class='stat'><small>回復</small><b id='regen'></b></div></div></header><main class='layout'><section class='card'><h2>🧩 合成ボード</h2><div id='board' class='board'></div><div id='msg' class='msg'>屋台をタップしてアイテムを出そう。</div><div class='btns'><button id='quickTop' class='primary' disabled>🚢 すぐ納品</button><button id='sort' class='warn'>🧺 整列</button><button id='bonus' class='good'>🎁 ボーナス</button><button id='sell' class='danger' disabled>🪙 売る</button><button id='clear'>選択解除</button><button id='reset'>最初から</button></div><div class='help'>納品できる注文があると、画面下の固定バーからスクロールなしで納品できます。</div></section><section class='card'><h2>📦 今日の注文</h2><div id='orders' class='orders'></div><h2>📖 物語</h2><div id='story'></div></section></main><section class='card'><h2>📚 リン図鑑</h2><div id='book' class='collection'></div></section></div><div class='quick'><div><b id='qtitle'>注文チェック中</b><small id='qsub'>スクロールしなくてOK</small></div><button id='quick' class='primary' disabled>🚢 すぐ納品</button></div><script> 'use strict';const $=id=>document.getElementById(id),G=36,MAX=80,EMS=180000,BMS=300000,SAVE='rin_harbor_save_v4';let S,sel=null,last=0;document.addEventListener('touchend',e=>{let n=Date.now();if(n-last<340)e.preventDefault();last=n},{passive:false}); const I={gen_cafe:['リンカフェ屋台','🏪','gen',null,[['drink1',65],['dessert1',35]]],gen_sea:['海辺の箱','🎁','gen',null,[['shell1',55],['fish1',45]]],gen_gift:['リボン屋台','🎀','gen',null,[['toy1',70],['dessert1',30]]],drink1:['コーヒー豆','🫘','drink',1,'drink2',1],drink2:['カップコーヒー','☕','drink',2,'drink3',3],drink3:['ミルクラテ','🥛','drink',3,'drink4',8],drink4:['スペシャルラテ','🍵','drink',4,null,18],dessert1:['クッキー','🍪','dessert',1,'dessert2',1],dessert2:['ドーナツ','🍩','dessert',2,'dessert3',3],dessert3:['ケーキ','🍰','dessert',3,'dessert4',8],dessert4:['豪華パフェ','🍨','dessert',4,null,18],shell1:['小さな貝','🐚','shell',1,'shell2',1],shell2:['真珠貝','🦪','shell',2,'shell3',3],shell3:['宝石の貝','💎','shell',3,'shell4',8],shell4:['海の宝箱','🧰','shell',4,null,18],fish1:['小魚','🐟','fish',1,'fish2',1],fish2:['焼き魚','🍢','fish',2,'fish3',3],fish3:['海鮮プレート','🍣','fish',3,'fish4',8],fish4:['豪華おすし','🍱','fish',4,null,18],toy1:['リボン','🎀','toy',1,'toy2',2],toy2:['ぬいぐるみ','🧸','toy',2,'toy3',5],toy3:['小さな王冠','👑','toy',3,'toy4',12],toy4:['リンの宝物','🌟','toy',4,null,25]},N=['ねこ船長','ペンギン店長','うさぎ観光客','カモメ配達員','イルカ先生','くまパティシエ'],ST=[['第1話：リンハーバーへようこそ','リンちゃんは、古くなった港をかわいく直すことにしました。',0],['第2話：桟橋を修理','桟橋がピカピカになって、お客さんが集まってきます。',3,30],['第3話：リボン屋台','かわいいリボン屋台ができました。宝物アイテムが作れます。',6,0,'gen_gift'],['第4話：灯台にあかり','夜でも船が安心して帰ってこられます。',9,0,null,20]]; const name=id=>I[id][0],emo=id=>I[id][1],kind=id=>I[id][2],lv=id=>I[id][3],next=id=>I[id][4],price=id=>I[id][5]||1,isGen=id=>kind(id)==='gen'; function init(){let b=Array(G).fill(null);b[0]='gen_cafe';b[5]='gen_sea';b[7]='drink1';b[8]='drink1';b[13]='dessert1';b[14]='shell1';return{board:b,coins:50,stars:0,energy:50,level:1,xp:0,story:0,orders:[],book:{gen_cafe:1,gen_sea:1,drink1:1,dessert1:1,shell1:1},lastE:Date.now(),lastB:0}} function load(){try{S=JSON.parse(localStorage.getItem(SAVE))||init()}catch(e){S=init()}if(!S.orders||!S.orders.length)S.orders=[order(),order(),order()];regen();save()}function save(){localStorage.setItem(SAVE,JSON.stringify(S))}function regen(){let g=Math.floor((Date.now()-S.lastE)/EMS);if(g>0){S.energy=Math.min(MAX,S.energy+g);S.lastE+=g*EMS}if(S.energy>=MAX){S.energy=MAX;S.lastE=Date.now()}}function say(t){$('msg').textContent=t}function th(){return 40+S.level*20}function addxp(x){S.xp+=x;while(S.xp>=th()){S.xp-=th();S.level++;S.coins+=20;S.energy=Math.min(MAX,S.energy+10);say('🎉 レベルアップ！')}}function empty(){return S.board.map((x,i)=>x?null:i).filter(x=>x!==null)}function add(id){let e=empty();if(!e.length)return false;S.board[e[Math.floor(Math.random()*e.length)]]=id;S.book[id]=1;return true}function pick(a){let t=a.reduce((s,x)=>s+x[1],0),r=Math.random()*t;for(let x of a){r-=x[1];if(r<=0)return x[0]}return a[0][0]}function pop(t){let p=document.createElement('div');p.className='pop';p.textContent=t;p.style.left='50%';p.style.top='82%';document.body.appendChild(p);setTimeout(()=>p.remove(),900)} function tap(i){let id=S.board[i];if(sel===null){if(!id)return say('空きマスだよ。');if(isGen(id))return gen(i);sel=i;say(`${name(id)} を選んだよ。`);return render()}if(sel===i){sel=null;say('選択解除。');return render()}move(sel,i)}function gen(i){let id=S.board[i];if(S.energy<=0)return say('エネルギー不足だよ。');if(!empty().length)return say('ボードがいっぱいだよ。');let made=pick(I[id][4]);add(made);S.energy--;say(`${name(id)}から${name(made)}が出たよ。`);pop('🫧');render()}function move(a,b){let x=S.board[a],y=S.board[b];if(!x)return;if(isGen(x)){sel=null;return say('屋台は動かせないよ。')}if(!y){S.board[b]=x;S.board[a]=null;sel=b;return render()}if(isGen(y))return say('屋台とは合成できないよ。');if(x===y&&next(x)){S.board[a]=null;S.board[b]=next(x);S.book[next(x)]=1;S.coins+=lv(next(x));addxp(3+lv(next(x)));sel=null;say(`✨ ${name(next(x))} ができたよ。`);pop('✨');return render()}say(x===y?'最高レベルだよ。':'同じアイテムを選んでね。');render()}function count(){let c={};S.board.forEach(id=>{if(id&&!isGen(id))c[id]=(c[id]||0)+1});return c}function can(o){let c=count();return o.wants.every(w=>(c[w.id]||0)>=w.n)}function first(){return S.orders.findIndex(can)}function order(){let ks=new Set(['drink','dessert','shell','fish']);if(S.board&&S.board.includes('gen_gift'))ks.add('toy');let ids=Object.keys(I).filter(id=>!isGen(id)&&ks.has(kind(id))&&lv(id)>=2&&lv(id)<=Math.min(4,S.level+2));let wants=[{id:ids[Math.floor(Math.random()*ids.length)],n:1}];let score=wants.reduce((s,w)=>s+lv(w.id)*lv(w.id)*w.n,0);return{title:N[Math.floor(Math.random()*N.length)]+'のお願い',wants,coin:10+score*4,star:score>=9?2:1,xp:10+score*3}} function complete(i){let o=S.orders[i];if(!o||!can(o))return say('まだ納品できないよ。');for(let w of o.wants){let n=w.n;for(let j=0;j<S.board.length&&n>0;j++)if(S.board[j]===w.id){S.board[j]=null;n--}}S.coins+=o.coin;S.stars+=o.star;addxp(o.xp);S.orders[i]=order();sel=null;say(`🚢 ${o.title}を納品したよ！`);pop('🚢⭐');render()}function quick(){let i=first();i>=0?complete(i):say('今は納品できる注文がないよ。')}function sortB(){let a=S.board.filter(Boolean);a.sort((x,y)=>(isGen(x)?-1:0)-(isGen(y)?-1:0)||kind(x).localeCompare(kind(y))||(lv(x)||0)-(lv(y)||0));S.board=[...a,...Array(G-a.length).fill(null)];sel=null;render()}function bonus(){if(Date.now()-S.lastB<BMS)return say('ボーナスは少し待ってね。');S.lastB=Date.now();S.energy=Math.min(MAX,S.energy+15);say('🎁 エネルギー回復！');render()}function sell(){if(sel===null)return say('売るアイテムを選んでね。');let id=S.board[sel];if(!id||isGen(id))return say('これは売れないよ。');S.board[sel]=null;S.coins+=Math.max(1,Math.floor(price(id)/2));sel=null;render()}function story(){let n=ST[S.story+1];if(!n)return say('今ある物語は全部開放済み！');if(S.stars<n[2])return say(`星が${n[2]}必要だよ。`);S.stars-=n[2];S.story++;if(n[3])S.coins+=n[3];if(n[4])add(n[4]);if(n[5])S.energy=Math.min(MAX,S.energy+n[5]);render()} function render(){regen();$('energy').textContent=`${S.energy}/${MAX}`;$('coins').textContent='🪙 '+S.coins;$('stars').textContent='⭐ '+S.stars;$('level').textContent=`${S.level}`;$('regen').textContent=S.energy>=MAX?'満タン':Math.ceil((EMS-(Date.now()-S.lastE))/60000)+'分';$('board').innerHTML=S.board.map((id,i)=>`<button class='cell ${!id?'empty':''} ${id&&isGen(id)?'gen':''} ${sel===i?'sel':''}' data-i='${i}'>${id?`<div class='em'>${emo(id)}</div><div class='nm'>${name(id)}</div>${isGen(id)?`<div class=tap>TAP</div>`:`<div class=lv>Lv${lv(id)}</div>`}`:''}</button>`).join('');let c=count();$('orders').innerHTML=S.orders.map((o,i)=>`<div class='order'><div class='ot'><span>${o.title}</span><span>🪙${o.coin} ⭐${o.star}</span></div>${o.wants.map(w=>`<div class='want ${(c[w.id]||0)>=w.n?'ok':'ng'}'><span>${emo(w.id)} ${name(w.id)}</span><span>${c[w.id]||0}/${w.n}</span></div>`).join('')}<button class='${can(o)?'primary':''}' data-o='${i}' ${can(o)?'':'disabled'}>${can(o)?'🚢 納品':'まだ足りない'}</button></div>`).join('');let cur=ST[S.story],nx=ST[S.story+1];$('story').innerHTML=`<div class='story'><b>${cur[0]}</b><p>${cur[1]}</p>${nx?`<div>次：${nx[0]} / ⭐${nx[2]} <button onclick='story()' ${S.stars>=nx[2]?'class=primary':'disabled'}>港を直す</button></div>`:'<b>物語は全部開放済み！</b>'}</div>`;$('book').innerHTML=Object.keys(I).filter(id=>isGen(id)||S.book[id]).map(id=>`<div class='book'><div class='be'>${S.book[id]||isGen(id)?emo(id):'❔'}</div><div>${S.book[id]||isGen(id)?name(id):'未発見'}</div><small>${isGen(id)?'発生源':'Lv'+lv(id)}</small></div>`).join('');let f=first();$('qtitle').textContent=f>=0?'🚢 納品できます':'注文欄までスクロール不要';$('qsub').textContent=f>=0?S.orders[f].title+'をワンタップ納品':'納品できるとここに出ます';$('quick').disabled=f<0;$('quickTop').disabled=f<0;$('sell').disabled=sel===null||!S.board[sel]||isGen(S.board[sel]);save()} $('board').onclick=e=>{let b=e.target.closest('.cell');if(b)tap(+b.dataset.i)};$('orders').onclick=e=>{let b=e.target.closest('button[data-o]');if(b)complete(+b.dataset.o)};$('quick').onclick=quick;$('quickTop').onclick=quick;$('sort').onclick=sortB;$('bonus').onclick=bonus;$('sell').onclick=sell;$('clear').onclick=()=>{sel=null;render()};$('reset').onclick=()=>{if(confirm('最初からやり直しますか？')){localStorage.removeItem(SAVE);load();render()}};setInterval(render,15000);load();render(); </script></body></html>
