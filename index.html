    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:radial-gradient(circle at 15% 8%,#fff 0 7%,transparent 8%),radial-gradient(circle at 83% 13%,rgba(255,255,255,.8) 0 6%,transparent 7%),linear-gradient(#e7fbff,#fff5db);overflow-x:hidden} body:before{content:"";position:fixed;left:-8%;right:-8%;bottom:-70px;height:220px;background:linear-gradient(var(--sea),var(--sea2));border-radius:50% 50% 0 0;z-index:-1}.app{max-width:1180px;margin:auto;padding:12px}.hero,.panel{background:var(--card);border:3px solid rgba(255,255,255,.85);border-radius:26px;box-shadow:var(--shadow);padding:14px}.hero{overflow:hidden;position:relative;background:radial-gradient(circle at 92% 6%,rgba(255,217,93,.65),transparent 23%),linear-gradient(135deg,#fff,#fff9dc)}.hero:after{content:"⚓";position:absolute;right:15px;bottom:-28px;font-size:110px;opacity:.12;transform:rotate(-14deg)}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}h1{margin:0;font-size:clamp(30px,7vw,52px);letter-spacing:.04em}.subtitle{margin:8px 0 0;font-weight:800;color:#4b6878;line-height:1.5}.badge{background:#fff;border:2px solid rgba(255,115,168,.35);border-radius:999px;padding:9px 13px;font-weight:1000;box-shadow:0 8px 18px rgba(255,115,168,.18)}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:13px}.stat{background:#fff;border:2px solid var(--line);border-radius:16px;padding:9px;min-height:61px}.stat small{display:block;color:#647b88;font-size:12px;font-weight:900}.stat b{font-size:20px}.layout{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(315px,.9fr);gap:14px;margin-top:14px}.panel h2{margin:0 0 10px;font-size:22px}.board{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.cell{aspect-ratio:1/1;border-radius:18px;border:3px solid var(--line);background:linear-gradient(#fff,#f1fbff);box-shadow:inset 0 -5px 0 rgba(0,0,0,.04),0 7px 12px rgba(20,80,110,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden;padding:3px}.cell.empty{background:rgba(255,255,255,.38);border-style:dashed}.cell.selected{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,115,168,.22),0 8px 18px rgba(20,80,110,.15)}.cell.generator{background:linear-gradient(#fff4c6,#ffe07d);border-color:rgba(255,173,60,.6)}.emoji{font-size:clamp(25px,7vw,43px);line-height:1;filter:drop-shadow(0 4px 4px rgba(20,80,110,.14))}.name{width:100%;font-size:clamp(9px,2.3vw,12px);font-weight:1000;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}.chip{position:absolute;top:4px;right:4px;min-width:22px;height:22px;border-radius:999px;background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:1000}.tap{position:absolute;top:5px;left:5px;background:rgba(255,255,255,.9);border-radius:999px;padding:3px 6px;color:#985700;font-size:10px;font-weight:1000}.msg{margin-top:10px;padding:11px 12px;min-height:47px;background:#fff;border:2px solid var(--line);border-radius:17px;font-weight:900;line-height:1.5}.buttons{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}button{appearance:none;border:2px solid var(--line);border-radius:999px;background:linear-gradient(#fff,#edf8ff);padding:10px 13px;color:var(--ink);font-weight:1000;box-shadow:0 5px 0 rgba(35,55,68,.08);cursor:pointer}button:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(35,55,68,.08)}button:disabled{opacity:.45;cursor:not-allowed}.primary{background:linear-gradient(#ff9bc1,#ff6ca3);color:#fff;border-color:rgba(255,255,255,.55)}.good{background:linear-gradient(#91f4a9,#55cf78);color:#063b17}.warn{background:linear-gradient(#ffe88f,#ffc84e);color:#593900}.danger{background:linear-gradient(#ff9ba4,#ff6270);color:#fff}.orders{display:grid;gap:10px}.order,.story,.book,.help{background:#fff;border:2px solid var(--line);border-radius:18px;padding:11px;box-shadow:0 6px 14px rgba(20,80,110,.08)}.ot{display:flex;justify-content:space-between;gap:8px;font-weight:1000;margin-bottom:8px}.reward{font-size:12px;color:#647b88;white-space:nowrap}.want{display:flex;justify-content:space-between;gap:8px;background:#f5fbff;border:1px solid var(--line);border-radius:12px;padding:7px 8px;font-weight:900;margin-bottom:6px}.want.ok{background:#ecfff2;color:#12672d}.want.ng{background:#fff3f5;color:#8d2731}.story{line-height:1.6}.story h3{margin:0 0 6px}.story p{margin:0;font-weight:800;color:#425d6b}.next{margin-top:10px;padding:10px;background:#f7fbff;border:2px dashed var(--line);border-radius:16px}.collection{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}.book{text-align:center;font-weight:1000;min-height:93px;display:flex;flex-direction:column;gap:5px;justify-content:center}.book.unknown{opacity:.45;filter:grayscale(1)}.be{font-size:28px}.book small{color:#647b88;font-weight:900}.help{margin-top:10px;line-height:1.65;font-weight:800;color:#425d6b}.foot{text-align:center;margin:16px 0 8px;font-size:12px;color:#647b88;font-weight:800}@media(max-width:900px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}}@media(max-width:520px){.app{padding:9px}.hero,.panel{padding:10px}.stats{grid-template-columns:repeat(2,1fr)}.board{gap:6px}.cell{border-radius:14px}.name{display:none}.chip{min-width:18px;height:18px;font-size:10px;border-width:1px}.tap{font-size:9px;padding:2px 5px}button{padding:10px 11px}}

<body>
  <div class="app">
    <header class="hero"><div class="top"><div><h1>⚓ リンハーバー</h1><p class="subtitle">リンちゃん専用。港を直しながら、かわいいアイテムを合成して注文を届けよう。</p></div><div class="badge">🌸 RIN ONLY</div></div><div class="stats"><div class="stat"><small>エネルギー</small><b id="energy">-</b></div><div class="stat"><small>コイン</small><b id="coins">-</b></div><div class="stat"><small>星</small><b id="stars">-</b></div><div class="stat"><small>レベル</small><b id="level">-</b></div><div class="stat"><small>次の回復</small><b id="regen">-</b></div></div></header>
    <main class="layout"><section class="panel"><h2>🧩 合成ボード</h2><div id="board" class="board"></div><div id="message" class="msg">カフェ屋台や海辺の箱をタップすると、アイテムが出るよ。</div><div class="buttons"><button id="sort" class="warn">🧺 整列</button><button id="bonus" class="good">🎁 お手伝いボーナス</button><button id="sell" class="danger" disabled>🪙 選択アイテムを売る</button><button id="clear">選択解除</button><button id="reset">最初から</button></div><div class="help"><b>遊び方：</b><br>1. 「リンカフェ屋台」や「海辺の箱」をタップ。<br>2. 同じアイテムを2つ選ぶと合成。<br>3. 注文を納品して星を集め、リンハーバーの物語を進めよう。</div></section><section class="panel"><h2>📦 今日の注文</h2><div id="orders" class="orders"></div><h2 style="margin-top:16px">📖 リンハーバー物語</h2><div id="story"></div></section></main>
    <section class="panel" style="margin-top:14px"><h2>📚 リン図鑑</h2><div id="collection" class="collection"></div></section><div class="foot">このアプリはリンハーバー用のオリジナル作品です。外部画像・外部通信は使用していません。</div>
  </div>
<script>
'use strict';
const GRID=36,MAX_ENERGY=80,ENERGY_MS=180000,BONUS_MS=300000,SAVE='rin_harbor_save_v2';
const I={
 gen_cafe:{id:'gen_cafe',name:'リンカフェ屋台',emoji:'☕',type:'generator',produces:[['drink1',65],['dessert1',35]]},gen_sea:{id:'gen_sea',name:'海辺の箱',emoji:'🧰',type:'generator',produces:[['shell1',55],['fish1',45]]},gen_gift:{id:'gen_gift',name:'リボン屋台',emoji:'🎀',type:'generator',produces:[['toy1',70],['dessert1',30]]},
 drink1:{id:'drink1',kind:'drink',level:1,name:'コーヒー豆',emoji:'🫘',next:'drink2',price:1},drink2:{id:'drink2',kind:'drink',level:2,name:'カップコーヒー',emoji:'☕',next:'drink3',price:3},drink3:{id:'drink3',kind:'drink',level:3,name:'ミルクラテ',emoji:'🥛',next:'drink4',price:8},drink4:{id:'drink4',kind:'drink',level:4,name:'スペシャルラテ',emoji:'🍵',next:null,price:18},
 dessert1:{id:'dessert1',kind:'dessert',level:1,name:'クッキー',emoji:'🍪',next:'dessert2',price:1},dessert2:{id:'dessert2',kind:'dessert',level:2,name:'ドーナツ',emoji:'🍩',next:'dessert3',price:3},dessert3:{id:'dessert3',kind:'dessert',level:3,name:'ケーキ',emoji:'🍰',next:'dessert4',price:8},dessert4:{id:'dessert4',kind:'dessert',level:4,name:'豪華パフェ',emoji:'🍨',next:null,price:18},
 shell1:{id:'shell1',kind:'shell',level:1,name:'小さな貝',emoji:'🐚',next:'shell2',price:1},shell2:{id:'shell2',kind:'shell',level:2,name:'真珠貝',emoji:'🦪',next:'shell3',price:3},shell3:{id:'shell3',kind:'shell',level:3,name:'宝石の貝',emoji:'💎',next:'shell4',price:8},shell4:{id:'shell4',kind:'shell',level:4,name:'海の宝箱',emoji:'🎁',next:null,price:18},
 fish1:{id:'fish1',kind:'fish',level:1,name:'小魚',emoji:'🐟',next:'fish2',price:1},fish2:{id:'fish2',kind:'fish',level:2,name:'焼き魚',emoji:'🍢',next:'fish3',price:3},fish3:{id:'fish3',kind:'fish',level:3,name:'海鮮プレート',emoji:'🍣',next:'fish4',price:8},fish4:{id:'fish4',kind:'fish',level:4,name:'豪華おすし',emoji:'🍱',next:null,price:18},
 toy1:{id:'toy1',kind:'toy',level:1,name:'リボン',emoji:'🎀',next:'toy2',price:2},toy2:{id:'toy2',kind:'toy',level:2,name:'ぬいぐるみ',emoji:'🧸',next:'toy3',price:5},toy3:{id:'toy3',kind:'toy',level:3,name:'小さな王冠',emoji:'👑',next:'toy4',price:12},toy4:{id:'toy4',kind:'toy',level:4,name:'リンの宝物',emoji:'🌟',next:null,price:25}
};
const STORY=[{title:'第1話：リンハーバーへようこそ',text:'海のそばにある小さな港、リンハーバー。リンちゃんは古くなった港をかわいく直すことにしました。',cost:0},{title:'第2話：小さな桟橋を修理',text:'ギシギシしていた桟橋がピカピカに。お客さんが少しずつ集まってきます。',cost:3,rewardCoins:30},{title:'第3話：リボン屋台オープン',text:'リンちゃんらしい、かわいいリボン屋台ができました。宝物アイテムを作れるようになります。',cost:6,rewardItem:'gen_gift'},{title:'第4話：灯台にあかり',text:'灯台に明かりがともりました。夜でも船が安心して帰ってこられます。',cost:9,rewardEnergy:20},{title:'第5話：港まつりの準備',text:'リンハーバーで港まつりを開くことになりました。みんなの注文を届けて、もっとにぎやかにしましょう。',cost:14,rewardCoins:80}];
const NAMES=['ねこ船長','ペンギン店長','うさぎ観光客','カモメ配達員','イルカ先生','くまパティシエ','りすの親子','ハムスター駅長'];
let S,sel=null;const $=id=>document.getElementById(id),board=$('board'),orders=$('orders'),msg=$('message');
function init(){let b=Array(GRID).fill(null);b[0]='gen_cafe';b[5]='gen_sea';b[7]='drink1';b[8]='drink1';b[13]='dessert1';b[14]='shell1';return{board:b,coins:50,stars:0,energy:50,level:1,xp:0,story:0,orders:[],discovered:{gen_cafe:1,gen_sea:1,drink1:1,dessert1:1,shell1:1},lastEnergyAt:Date.now(),lastBonusAt:0}};
function load(){try{S=JSON.parse(localStorage.getItem(SAVE))||init()}catch(e){S=init()}normalize();regen();if(!S.orders||!S.orders.length)S.orders=Array.from({length:3},order);save()}
function normalize(){const B=init();S=Object.assign(B,S||{});if(!Array.isArray(S.board)||S.board.length!==GRID)S.board=B.board;S.board=S.board.map(x=>I[x]?x:null);S.energy=Math.max(0,Math.min(MAX_ENERGY,+S.energy||50));S.coins=+S.coins||0;S.stars=+S.stars||0;S.level=Math.max(1,+S.level||1);S.xp=Math.max(0,+S.xp||0);S.story=Math.max(0,Math.min(STORY.length-1,+S.story||0));S.discovered=S.discovered&&typeof S.discovered==='object'?S.discovered:{};S.lastEnergyAt=+S.lastEnergyAt||Date.now();S.lastBonusAt=+S.lastBonusAt||0;S.board.forEach(x=>{if(x)S.discovered[x]=1})}
function save(){localStorage.setItem(SAVE,JSON.stringify(S))}function say(t){msg.textContent=t}function regen(){if(S.energy>=MAX_ENERGY){S.energy=MAX_ENERGY;S.lastEnergyAt=Date.now();return}let n=Date.now(),g=Math.floor(Math.max(0,n-S.lastEnergyAt)/ENERGY_MS);if(g>0){S.energy=Math.min(MAX_ENERGY,S.energy+g);S.lastEnergyAt+=g*ENERGY_MS}}function th(l){return 40+l*20}function xp(v){S.xp+=v;while(S.xp>=th(S.level)){S.xp-=th(S.level);S.level++;S.coins+=20;S.energy=Math.min(MAX_ENERGY,S.energy+10);say('🎉 レベルアップ！ コインとエネルギーをもらったよ。')}}
function empty(){let a=[];S.board.forEach((x,i)=>{if(!x)a.push(i)});return a}function near(i){let a=[],r=Math.floor(i/6),c=i%6;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;let nr=r+dr,nc=c+dc,ni=nr*6+nc;if(nr>=0&&nr<6&&nc>=0&&nc<6&&!S.board[ni])a.push(ni)}return a}function add(id,base){let a=Number.isInteger(base)?near(base):[],e=empty(),c=a.length?a:e;if(!c.length)return false;S.board[c[Math.floor(Math.random()*c.length)]]=id;S.discovered[id]=1;return true}function pick(p){let t=p.reduce((s,x)=>s+x[1],0),r=Math.random()*t;for(const x of p){r-=x[1];if(r<=0)return x[0]}return p[0][0]}
function tap(i){regen();let id=S.board[i],it=I[id];if(sel===null){if(!it){say('空きマスだよ。発生源をタップしてアイテムを出してね。');return render()}if(it.type==='generator')return gen(i);sel=i;say(`${it.emoji} ${it.name} を選んだよ。同じアイテムをタップすると合成できるよ。`);return render()}if(sel===i){sel=null;say('選択を解除したよ。');return render()}move(sel,i)}
function gen(i){let id=S.board[i],g=I[id];if(S.energy<=0){say('エネルギーが足りないよ。少し待つか、お手伝いボーナスを使ってね。');return render()}if(!empty().length){say('ボードがいっぱいだよ。合成するか、いらないアイテムを売ってね。');return render()}let made=pick(g.produces);add(made,i);S.energy--;sel=null;say(`${g.emoji} ${g.name} から ${I[made].emoji} ${I[made].name} が出たよ。`);render()}
function move(a,b){let x=S.board[a],y=S.board[b],sx=I[x],sy=I[y];if(!x){sel=null;return render()}if(sx.type==='generator'){sel=null;say('発生源は動かせないよ。タップしてアイテムを出してね。');return render()}if(!y){S.board[b]=x;S.board[a]=null;sel=b;say(`${sx.emoji} ${sx.name} を移動したよ。`);return render()}if(sy.type==='generator'){say('発生源とは合成できないよ。');return render()}if(x===y&&sx.next){S.board[a]=null;S.board[b]=sx.next;S.discovered[sx.next]=1;S.coins+=Math.max(1,I[sx.next].level);xp(3+I[sx.next].level);sel=null;say(`✨ 合成成功！ ${I[sx.next].emoji} ${I[sx.next].name} ができたよ。`);return render()}say(x===y?'これは最高レベルのアイテムだよ。':'違うアイテム同士は合成できないよ。同じアイテムを選んでね。');render()}
function counts(){let c={};S.board.forEach(id=>{if(id&&I[id].type!=='generator')c[id]=(c[id]||0)+1});return c}function can(o){let c=counts();return o.wants.every(w=>(c[w.id]||0)>=w.count)}function consume(wants){for(const w of wants){let n=w.count;for(let i=0;i<S.board.length&&n>0;i++)if(S.board[i]===w.id){S.board[i]=null;n--}}}
function kinds(){let k=new Set(['drink','dessert','shell','fish']);if(S.board.includes('gen_gift'))k.add('toy');return k}function order(){let k=kinds(),max=Math.min(4,Math.max(2,Math.floor(S.level/2)+2)),cand=Object.values(I).filter(x=>x.type!=='generator'&&k.has(x.kind)&&x.level>=2&&x.level<=max),n=Math.random()<.72?1:2,w=[];for(let i=0;i<n;i++){let it=cand[Math.floor(Math.random()*cand.length)],e=w.find(x=>x.id===it.id);e?e.count++:w.push({id:it.id,count:1})}let score=w.reduce((s,x)=>s+I[x.id].level*I[x.id].level*x.count,0);return{id:'o_'+Date.now()+Math.random().toString(36).slice(2),title:NAMES[Math.floor(Math.random()*NAMES.length)]+'のお願い',wants:w,rewardCoins:10+score*4,rewardStars:score>=12?2:1,rewardXp:10+score*3}}
function complete(i){let o=S.orders[i];if(!o)return;if(!can(o)){say('まだアイテムが足りないよ。合成してそろえよう。');return render()}consume(o.wants);S.coins+=o.rewardCoins;S.stars+=o.rewardStars;xp(o.rewardXp);S.orders.splice(i,1,order());sel=null;say(`🚢 ${o.title} を納品したよ！ コインと星をゲット！`);render()}
function storyUp(){let n=STORY[S.story+1];if(!n){say('今ある物語は全部開放済みだよ。リンハーバーは大にぎわい！');return render()}if(S.stars<n.cost){say(`星が足りないよ。次のお話には ⭐${n.cost} 必要だよ。`);return render()}if(n.rewardItem&&!empty().length){say('新しい屋台を置く空きマスが必要だよ。先にボードを空けてね。');return render()}S.stars-=n.cost;S.story++;if(n.rewardCoins)S.coins+=n.rewardCoins;if(n.rewardEnergy)S.energy=Math.min(MAX_ENERGY,S.energy+n.rewardEnergy);if(n.rewardItem)add(n.rewardItem);sel=null;say(`📖 ${n.title} を開放したよ！`);render()}
function sell(){if(sel===null)return say('売るアイテムを先に選んでね。');let id=S.board[sel],it=I[id];if(!id)return;if(it.type==='generator'){say('発生源は売れないよ。');return render()}let p=Math.max(1,Math.floor(it.price/2));S.board[sel]=null;S.coins+=p;sel=null;say(`${it.emoji} ${it.name} を売って ${p} コインをもらったよ。`);render()}
function sortBoard(){let g=[],a=[];S.board.forEach(id=>{if(!id)return;(I[id].type==='generator'?g:a).push(id)});a.sort((x,y)=>I[x].kind.localeCompare(I[y].kind)||I[x].level-I[y].level);S.board=[...g,...a];while(S.board.length<GRID)S.board.push(null);sel=null;say('🧺 ボードを整列したよ。');render()}function bonus(){let now=Date.now(),r=BONUS_MS-(now-S.lastBonusAt);if(r>0){say(`お手伝いボーナスは、あと ${Math.floor(r/60000)}分${Math.ceil((r%60000)/1000)}秒 で使えるよ。`);return render()}S.lastBonusAt=now;S.energy=Math.min(MAX_ENERGY,S.energy+15);say('🎁 お手伝いボーナス！ エネルギーが15回復したよ。');render()}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function render(){regen();$('energy').textContent=`${S.energy}/${MAX_ENERGY}`;$('coins').textContent='🪙 '+S.coins;$('stars').textContent='⭐ '+S.stars;$('level').textContent=`${S.level} / ${S.xp}/${th(S.level)}`;$('regen').textContent=S.energy>=MAX_ENERGY?'満タン':Math.ceil(Math.max(0,ENERGY_MS-(Date.now()-S.lastEnergyAt))/60000)+'分';board.innerHTML='';S.board.forEach((id,i)=>{let it=I[id],b=document.createElement('button');b.className='cell'+(!it?' empty':'')+(sel===i?' selected':'')+(it&&it.type==='generator'?' generator':'');b.dataset.i=i;b.type='button';if(it){b.innerHTML=`<div class="emoji">${it.emoji}</div><div class="name">${esc(it.name)}</div>${it.type==='generator'?'<div class="tap">TAP</div>':`<div class="chip">Lv${it.level}</div>`}`}board.appendChild(b)});renderOrders();renderStory();renderBook();$('sell').disabled=sel===null||!S.board[sel]||I[S.board[sel]].type==='generator';save()}
function renderOrders(){let c=counts();orders.innerHTML='';S.orders.forEach((o,i)=>{let card=document.createElement('div');card.className='order';card.innerHTML=`<div class="ot"><span>${esc(o.title)}</span><span class="reward">🪙${o.rewardCoins} ⭐${o.rewardStars}</span></div>`+o.wants.map(w=>`<div class="want ${(c[w.id]||0)>=w.count?'ok':'ng'}"><span>${I[w.id].emoji} ${esc(I[w.id].name)}</span><span>${c[w.id]||0}/${w.count}</span></div>`).join('')+`<button data-o="${i}" class="${can(o)?'primary':''}" ${can(o)?'':'disabled'}>${can(o)?'🚢 納品する':'まだ足りない'}</button>`;orders.appendChild(card)})}
function renderStory(){let cur=STORY[S.story],nx=STORY[S.story+1],canOpen=nx&&S.stars>=nx.cost;$('story').innerHTML=`<div class="story"><h3>${esc(cur.title)}</h3><p>${esc(cur.text)}</p><div class="next">${nx?`<b>次のお話：</b>${esc(nx.title)}<br>必要な星：⭐${nx.cost}<br><button id="openStory" class="${canOpen?'primary':''}" ${canOpen?'':'disabled'}>${canOpen?'⭐ 港を直す':'星が足りない'}</button>`:'<b>今ある物語は全部開放済み！</b><br>注文を届けて、リンハーバーをもっとにぎやかにしよう。'}</div></div>`;let btn=$('openStory');if(btn)btn.onclick=storyUp}
function renderBook(){let ids=Object.keys(I).filter(id=>I[id].type!=='generator'||S.discovered[id]);ids.sort((a,b)=>{let x=I[a],y=I[b];return (x.type==='generator'?-1:0)-(y.type==='generator'?-1:0)||(x.kind||'').localeCompare(y.kind||'')||(x.level||0)-(y.level||0)});$('collection').innerHTML=ids.map(id=>{let it=I[id],k=!!S.discovered[id];return `<div class="book ${k?'':'unknown'}"><div class="be">${k?it.emoji:'❔'}</div><div>${esc(k?it.name:'未発見')}</div><small>${it.type==='generator'?'発生源':'Lv'+it.level}</small></div>`}).join('')}
board.onclick=e=>{let b=e.target.closest('.cell');if(b)tap(+b.dataset.i)};orders.onclick=e=>{let b=e.target.closest('button[data-o]');if(b)complete(+b.dataset.o)};$('sort').onclick=sortBoard;$('bonus').onclick=bonus;$('sell').onclick=sell;$('clear').onclick=()=>{sel=null;say('選択を解除したよ。');render()};$('reset').onclick=()=>{if(confirm('リンハーバーを最初からやり直しますか？')){localStorage.removeItem(SAVE);sel=null;load();say('新しいリンハーバーを始めたよ。');render()}};setInterval(()=>{regen();render();},15000);load();render();
</script>
</body>
</html>
