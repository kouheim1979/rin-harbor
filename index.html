<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;color:var(--ink);background:linear-gradient(#ddf8ff,#fff4d8);-webkit-user-select:none;user-select:none}body:before{content:'';position:fixed;left:-10%;right:-10%;bottom:-80px;height:220px;background:repeating-radial-gradient(ellipse at 30% 0,rgba(255,255,255,.35) 0 18px,transparent 19px 46px),linear-gradient(var(--sea),var(--sea2));border-radius:50% 50% 0 0;z-index:-2;animation:wave 6s infinite ease-in-out}.app{height:100dvh;padding:8px 8px calc(76px + env(safe-area-inset-bottom,0px));max-width:980px;margin:auto}.screen{display:none;height:100%;overflow:auto;touch-action:pan-y}.screen.on{display:block}.screen.game{overflow:hidden;touch-action:none}.card{background:rgba(255,255,255,.94);border:3px solid rgba(255,255,255,.9);border-radius:24px;box-shadow:var(--shadow);padding:12px;margin-bottom:10px}.top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.title{font-size:clamp(28px,7vw,48px);font-weight:1000;line-height:1;text-shadow:0 3px #fff}.sub{font-weight:900;color:#4d6a78}.movie{height:min(54dvh,420px);min-height:245px;border-radius:28px;overflow:hidden;position:relative;background:linear-gradient(#bcefff 0 48%,#73d6ff 49% 68%,#ffd08a 69%);border:3px solid #ffffffaa}.movie.small{height:112px;min-height:112px;border-radius:22px}.sun{position:absolute;right:9%;top:10%;width:52px;height:52px;border-radius:50%;background:#ffda61;box-shadow:0 0 0 14px #ffda6135;animation:pulse 2.8s infinite}.cloud{position:absolute;top:16%;left:-60px;font-size:38px;animation:cloud 12s linear infinite}.boat{position:absolute;bottom:31%;left:-90px;font-size:60px;animation:boat 10s linear infinite}.rin{position:absolute;left:50%;bottom:10%;transform:translateX(-50%);font-size:82px;animation:rin 2.4s ease-in-out infinite;filter:drop-shadow(0 10px 9px rgba(80,30,60,.25))}.movie.small .rin{font-size:52px}.caption{position:absolute;left:12px;bottom:12px;background:#ffffffe8;border:2px solid #0001;border-radius:999px;padding:8px 12px;font-weight:1000}.startPanel{position:absolute;left:50%;bottom:18%;transform:translateX(-50%);display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:min(92%,540px)}button{appearance:none;border:2px solid #0001;border-radius:999px;background:linear-gradient(#fff,#edf8ff);padding:10px 13px;font-weight:1000;font-size:16px;color:var(--ink);box-shadow:0 4px #0001}button:active{transform:translateY(2px)}button:disabled{opacity:.45}.primary{background:linear-gradient(var(--pink2),var(--pink));color:white}.good{background:linear-gradient(#91f4a9,#55cf78)}.warn{background:linear-gradient(#ffe88f,#ffc84e)}.danger{background:linear-gradient(#ff9ba4,#ff6270);color:white}.off{background:linear-gradient(#ddd,#bbb);color:#333}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.stat{background:#fff;border:2px solid var(--line);border-radius:15px;padding:7px;text-align:center}.stat small{display:block;color:#688;font-weight:900;font-size:11px}.stat b{font-size:18px}.homeGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.menuCard{background:#fff;border:2px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 8px 18px #12608012;min-height:130px;display:flex;flex-direction:column;justify-content:space-between;text-align:left}.menuIcon{font-size:42px}.gamePage{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto auto auto;gap:7px;overflow:hidden}.gameHead{background:rgba(255,255,255,.94);border:3px solid rgba(255,255,255,.9);border-radius:22px;box-shadow:var(--shadow);padding:8px}.gameHeadRow{display:flex;justify-content:space-between;gap:8px;align-items:center}.gameTitle{font-size:24px;font-weight:1000}.miniStats{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}.miniStats span{background:#fff;border:2px solid var(--line);border-radius:999px;padding:4px 7px;font-weight:1000;font-size:13px}.boardBox{display:flex;align-items:center;justify-content:center;min-height:0}.board{width:min(calc(100vw - 22px),calc(100dvh - 312px),520px);height:min(calc(100vw - 22px),calc(100dvh - 312px),520px);display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(6,1fr);gap:5px;contain:layout paint;touch-action:none}.cell{border:3px solid var(--line);border-radius:16px;background:linear-gradient(#fff,#f1fbff);box-shadow:inset 0 -4px #00000008,0 4px 10px #12608014;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;will-change:transform}.cell:active{transform:scale(.95)}.cell.empty{border-style:dashed;background:#ffffff70}.cell.gen{background:linear-gradient(#fff2bf,#ffdf7b)}.cell.sel{border-color:var(--pink);box-shadow:0 0 0 3px #ff70aa33}.cell.dropTarget{border-color:#55cf78;box-shadow:0 0 0 4px rgba(85,207,120,.32)}.cell.dragSource{opacity:.45}.em{font-size:clamp(23px,7vw,40px);filter:drop-shadow(0 3px 3px #12608022)}.nm{font-size:10px;font-weight:1000;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}.lv,.tap{position:absolute;top:3px;border-radius:999px;background:#fff;border:1px solid #0001;font-size:9px;font-weight:1000;padding:2px 4px}.lv{right:3px}.tap{left:3px;color:#9b5b00}.orderStrip{background:#fffffff2;border:3px solid #ffffffcc;border-radius:21px;box-shadow:var(--shadow);padding:8px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.orderStrip b{display:block}.orderStrip small{display:block;color:#688;font-weight:900}.wantMini{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}.wantMini span{background:#f5fbff;border:1px solid var(--line);border-radius:999px;padding:3px 7px;font-weight:1000;font-size:13px}.wantMini .ok{background:#edfff2;color:#11652b}.controls{background:#fffffff2;border:3px solid #ffffffcc;border-radius:21px;box-shadow:var(--shadow);padding:7px;display:flex;gap:6px;overflow-x:auto;touch-action:pan-x}.controls button{white-space:nowrap;padding:9px 11px}.msg{background:#fff;border:2px solid var(--line);border-radius:16px;padding:8px;font-weight:900;font-size:14px;line-height:1.35}.orders,.storyList,.bookGrid{display:grid;gap:8px}.order,.storyCard,.book{background:#fff;border:2px solid var(--line);border-radius:18px;padding:10px;box-shadow:0 6px 14px #12608012}.ot{display:flex;justify-content:space-between;gap:8px;font-weight:1000}.want{display:flex;justify-content:space-between;margin-top:6px;padding:7px;border-radius:12px;background:#f5fbff;font-weight:900}.want.ok{background:#edfff2;color:#11652b}.want.ng{background:#fff3f5;color:#8d2731}.bookGrid{grid-template-columns:repeat(auto-fill,minmax(84px,1fr))}.book{text-align:center;font-weight:1000}.be{font-size:30px}.nav{position:fixed;left:8px;right:8px;bottom:calc(8px + env(safe-area-inset-bottom,0px));max-width:740px;margin:auto;background:#fffffff2;border:3px solid #ffffffcc;border-radius:25px;box-shadow:0 15px 34px #12608033;padding:7px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:10}.nav button{padding:8px 4px;border-radius:18px;font-size:12px;box-shadow:none}.nav button.active{background:linear-gradient(#ff9bc1,#ff6ca3);color:#fff}.pop{position:fixed;pointer-events:none;font-size:32px;animation:pop .65s forwards;z-index:99}.dragGhost{position:fixed;left:0;top:0;width:64px;height:64px;border-radius:18px;background:#fffffff2;border:3px solid var(--pink);box-shadow:0 14px 30px rgba(30,80,120,.28);display:flex;align-items:center;justify-content:center;font-size:38px;z-index:100;pointer-events:none;transform:translate(-50%,-50%)}@keyframes wave{50%{transform:translateY(10px)}}@keyframes cloud{to{transform:translateX(1200px)}}@keyframes boat{to{transform:translateX(1250px)}}@keyframes rin{50%{transform:translate(-50%,-8px)}}@keyframes pulse{50%{transform:scale(1.08)}}@keyframes pop{0%{opacity:0;transform:translate(-50%,-10px)}30%{opacity:1}to{opacity:0;transform:translate(-50%,-58px) scale(1.15)}}@media(max-width:540px){.app{padding-left:7px;padding-right:7px}.card{padding:10px}.stats{grid-template-columns:repeat(2,1fr)}.homeGrid{grid-template-columns:1fr 1fr}.movie{min-height:245px}.movie.small{height:104px;min-height:104px}.rin{font-size:66px}.movie.small .rin{font-size:46px}.nm{display:none}.cell{border-radius:13px}.orderStrip{grid-template-columns:1fr 104px}.orderStrip button{padding:9px 8px}.controls button{font-size:14px}.gameTitle{font-size:22px}.dragGhost{width:58px;height:58px;font-size:34px}}
</style>

<body>
<div class='app'>
<section id='screenOpening' class='screen on'><div class='movie'><div class='sun'></div><div class='cloud'>☁️</div><div class='boat'>⛵</div><div class='rin'>👧🏻🎀</div><div class='caption'>リンちゃんだけの港がはじまるよ</div><div class='startPanel'><button id='startHome' class='primary'>🌸 はじめる</button><button id='startGame' class='good'>🧩 すぐゲーム</button></div></div><div class='card'><div class='title'>⚓ リンハーバー</div><div class='sub'>ドラッグ&ドロップ対応。ゲーム画面はスクロールなしで遊べます。</div></div></section>
<section id='screenHome' class='screen'><header class='card'><div class='top'><div><div class='title'>🏠 ホーム</div><div class='sub'>リンハーバーの今日の様子</div></div><button data-go='game' class='primary'>遊ぶ</button></div><div class='movie small'><div class='sun'></div><div class='cloud'>☁️</div><div class='boat'>⛵</div><div class='rin'>👧🏻🎀</div></div><div id='statsHome' class='stats'></div></header><div class='homeGrid'><button class='menuCard' data-go='game'><span class='menuIcon'>🧩</span><b>ゲーム</b><span>ドラッグで合成</span></button><button class='menuCard' data-go='story'><span class='menuIcon'>📖</span><b>物語</b><span>クリアで自動進行</span></button><div class='menuCard'><span class='menuIcon'>🚢</span><b id='homeOrderTitle'>注文チェック中</b><span id='homeOrderSub'>注文は多めにあります</span><button id='homeQuick' class='primary' disabled>今すぐ納品</button></div><div class='menuCard'><span class='menuIcon'>🤖</span><b>自動納品</b><span>そろったら勝手に納品</span><button id='autoHome' class='good'>自動納品 ON</button></div></div></section>
<section id='screenGame' class='screen game'><div class='gamePage'><header class='gameHead'><div class='gameHeadRow'><div class='gameTitle'>🧩 リンハーバー</div><button data-go='home'>🏠</button></div><div id='miniStats' class='miniStats'></div></header><div class='boardBox'><div id='board' class='board'></div></div><div class='orderStrip'><div><b id='nextOrderTitle'>注文チェック中</b><small id='nextOrderSub'>自動納品ONなら押さなくてOK</small><div id='nextWants' class='wantMini'></div></div><button id='quickTop' class='primary' disabled>🚢 納品</button></div><div class='controls'><button id='autoGame' class='good'>🤖 ON</button><button id='sort' class='warn'>🧺 整列</button><button id='bonus' class='good'>🎁 回復</button><button id='sell' class='danger' disabled>🪙 売る</button><button id='clear'>解除</button><button id='reset'>最初</button></div><div id='msg' class='msg'>アイテムをドラッグして同じアイテムに重ねると合成できます。</div></div></section>
<section id='screenStory' class='screen'><header class='card'><div class='top'><div><div class='title'>📖 物語</div><div class='sub'>星がたまると自動で進みます</div></div><button data-go='game' class='primary'>星を集める</button></div><div id='statsStory' class='stats'></div></header><div class='card'><h2>港の物語</h2><div id='storyList' class='storyList'></div></div><div class='card'><h2>📚 リン図鑑</h2><div id='book' class='bookGrid'></div></div><div class='card'><h2>📦 注文一覧</h2><div id='orders' class='orders'></div></div></section>
</div>
<nav id='nav' class='nav'><button data-go='opening'>🎬<br>開始</button><button data-go='home'>🏠<br>ホーム</button><button data-go='game'>🧩<br>ゲーム</button><button data-go='story'>📖<br>物語</button></nav>
<script>
'use strict';
const $=id=>document.getElementById(id),G=36,MAX=80,ORDER_TARGET=8,EMS=180000,BMS=300000,SAVE='rin_harbor_save_v5';let S,sel=null,view='opening',saveTimer=null,dirtyStory=true,dirtyBook=true,drag=null;
window.addEventListener('gesturestart',e=>e.preventDefault());
const I={gen_cafe:{n:'リンカフェ屋台',e:'🏪',k:'gen',p:[['drink1',65],['dessert1',35]]},gen_sea:{n:'海辺の箱',e:'🎁',k:'gen',p:[['shell1',55],['fish1',45]]},gen_gift:{n:'リボン屋台',e:'🎀',k:'gen',p:[['toy1',70],['dessert1',30]]},drink1:{n:'コーヒー豆',e:'🫘',k:'drink',l:1,next:'drink2',price:1},drink2:{n:'カップコーヒー',e:'☕',k:'drink',l:2,next:'drink3',price:3},drink3:{n:'ミルクラテ',e:'🥛',k:'drink',l:3,next:'drink4',price:8},drink4:{n:'スペシャルラテ',e:'🍵',k:'drink',l:4,next:null,price:18},dessert1:{n:'クッキー',e:'🍪',k:'dessert',l:1,next:'dessert2',price:1},dessert2:{n:'ドーナツ',e:'🍩',k:'dessert',l:2,next:'dessert3',price:3},dessert3:{n:'ケーキ',e:'🍰',k:'dessert',l:3,next:'dessert4',price:8},dessert4:{n:'豪華パフェ',e:'🍨',k:'dessert',l:4,next:null,price:18},shell1:{n:'小さな貝',e:'🐚',k:'shell',l:1,next:'shell2',price:1},shell2:{n:'真珠貝',e:'🦪',k:'shell',l:2,next:'shell3',price:3},shell3:{n:'宝石の貝',e:'💎',k:'shell',l:3,next:'shell4',price:8},shell4:{n:'海の宝箱',e:'🧰',k:'shell',l:4,next:null,price:18},fish1:{n:'小魚',e:'🐟',k:'fish',l:1,next:'fish2',price:1},fish2:{n:'焼き魚',e:'🍢',k:'fish',l:2,next:'fish3',price:3},fish3:{n:'海鮮プレート',e:'🍣',k:'fish',l:3,next:'fish4',price:8},fish4:{n:'豪華おすし',e:'🍱',k:'fish',l:4,next:null,price:18},toy1:{n:'リボン',e:'🎀',k:'toy',l:1,next:'toy2',price:2},toy2:{n:'ぬいぐるみ',e:'🧸',k:'toy',l:2,next:'toy3',price:5},toy3:{n:'小さな王冠',e:'👑',k:'toy',l:3,next:'toy4',price:12},toy4:{n:'リンの宝物',e:'🌟',k:'toy',l:4,next:null,price:25}};
const N=['ねこ船長','ペンギン店長','うさぎ観光客','カモメ配達員','イルカ先生','くまパティシエ','りす親子','ハムスター駅長','ラッコ案内人','カニ職人'];
const ST=[{t:'第1話：リンハーバーへようこそ',x:'リンちゃんは古くなった港をかわいく直すことにしました。',cost:0},{t:'第2話：桟橋を修理',x:'桟橋がピカピカになって、お客さんが集まってきます。',cost:3,coins:30},{t:'第3話：リボン屋台',x:'かわいいリボン屋台ができました。宝物アイテムが作れます。',cost:6,item:'gen_gift'},{t:'第4話：灯台にあかり',x:'夜でも船が安心して帰ってこられます。',cost:9,energy:20},{t:'第5話：港まつり',x:'港まつりの準備が始まりました。注文を届けてもっとにぎやかにしましょう。',cost:14,coins:80},{t:'第6話：リンハーバー完成',x:'みんなが集まる、明るくてかわいい港になりました。',cost:20,energy:30}];
const isGen=id=>I[id]&&I[id].k==='gen',name=id=>I[id].n,emo=id=>I[id].e,lv=id=>I[id].l||0;
function init(){let b=Array(G).fill(null);b[0]='gen_cafe';b[5]='gen_sea';b[7]='drink1';b[8]='drink1';b[13]='dessert1';b[14]='shell1';return{board:b,coins:50,stars:0,energy:50,level:1,xp:0,story:0,orders:[],book:{gen_cafe:1,gen_sea:1,drink1:1,dessert1:1,shell1:1},auto:true,autoStory:true,lastE:Date.now(),lastB:0}}
function load(){try{S=JSON.parse(localStorage.getItem(SAVE))||JSON.parse(localStorage.getItem('rin_harbor_save_v4'))||init()}catch(e){S=init()}normalize();regen();ensureOrders();saveNow()}
function normalize(){let base=init();S=Object.assign(base,S||{});if(!Array.isArray(S.board)||S.board.length!==G)S.board=base.board;S.board=S.board.map(id=>I[id]?id:null);S.orders=Array.isArray(S.orders)?S.orders.filter(o=>o&&Array.isArray(o.wants)):[];S.book=S.book&&typeof S.book==='object'?S.book:{};S.auto=S.auto!==false;S.autoStory=S.autoStory!==false;S.lastE=+S.lastE||Date.now();S.lastB=+S.lastB||0;S.board.forEach(id=>{if(id)S.book[id]=1})}
function saveNow(){localStorage.setItem(SAVE,JSON.stringify(S))}function saveSoon(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,140)}
function regen(){let g=Math.floor((Date.now()-S.lastE)/EMS);if(g>0){S.energy=Math.min(MAX,S.energy+g);S.lastE+=g*EMS}if(S.energy>=MAX){S.energy=MAX;S.lastE=Date.now()}}
function say(t){$('msg').textContent=t}function th(){return 40+S.level*20}function addxp(x){S.xp+=x;while(S.xp>=th()){S.xp-=th();S.level++;S.coins+=20;S.energy=Math.min(MAX,S.energy+10);say('🎉 レベルアップ！')}}function empty(){let a=[];for(let i=0;i<S.board.length;i++)if(!S.board[i])a.push(i);return a}function add(id){let e=empty();if(!e.length)return false;S.board[e[Math.floor(Math.random()*e.length)]]=id;S.book[id]=1;dirtyBook=true;return true}function pick(a){let t=a.reduce((s,x)=>s+x[1],0),r=Math.random()*t;for(let x of a){r-=x[1];if(r<=0)return x[0]}return a[0][0]}
function pop(t){let p=document.createElement('div');p.className='pop';p.textContent=t;p.style.left='50%';p.style.top='82%';document.body.appendChild(p);setTimeout(()=>p.remove(),700)}
function ensureOrders(){while(S.orders.length<ORDER_TARGET)S.orders.push(order())}
function finish(t){ensureOrders();if(t)say(t);if(S.auto)autoDeliver();if(S.autoStory)autoOpenStory();renderGame();saveSoon()}
function tap(i){let id=S.board[i];if(sel===null){if(!id){say('空きマスだよ。');return}if(isGen(id))return gen(i);sel=i;say(name(id)+' を選んだよ。ドラッグでも合成できます。');renderGame();return}if(sel===i){sel=null;say('選択解除。');renderGame();return}moveOrMerge(sel,i)}
function gen(i){let id=S.board[i];if(S.energy<=0){say('エネルギー不足だよ。');return}if(!empty().length){say('ボードがいっぱいだよ。合成か売却をしてね。');return}let made=pick(I[id].p);add(made);S.energy--;finish(name(made)+' が出たよ。')}
function moveOrMerge(a,b){let x=S.board[a],y=S.board[b];if(!x)return;if(isGen(x)){sel=null;say('屋台は動かせないよ。');return}if(a===b){sel=null;renderGame();return}if(!y){S.board[b]=x;S.board[a]=null;sel=b;renderGame();saveSoon();return}if(isGen(y)){say('屋台とは合成できないよ。');return}if(x===y&&I[x].next){let z=I[x].next;S.board[a]=null;S.board[b]=z;S.book[z]=1;dirtyBook=true;S.coins+=lv(z);addxp(3+lv(z));sel=null;pop('✨');finish(name(z)+' ができたよ。');return}say(x===y?'最高レベルだよ。':'同じアイテムを重ねてね。')}
function count(){let c={};for(let id of S.board)if(id&&!isGen(id))c[id]=(c[id]||0)+1;return c}function can(o){let c=count();return o.wants.every(w=>(c[w.id]||0)>=w.n)}function first(){return S.orders.findIndex(can)}
function order(){let ks=new Set(['drink','dessert','shell','fish']);if(S.board&&S.board.includes('gen_gift'))ks.add('toy');let max=Math.min(4,Math.max(2,S.level+1));let ids=Object.keys(I).filter(id=>!isGen(id)&&ks.has(I[id].k)&&lv(id)>=2&&lv(id)<=max);let wantCount=Math.random()<.82?1:2;let wants=[];for(let i=0;i<wantCount;i++){let id=ids[Math.floor(Math.random()*ids.length)]||'drink2';let w=wants.find(x=>x.id===id);w?w.n++:wants.push({id,n:1})}let score=wants.reduce((s,w)=>s+lv(w.id)*lv(w.id)*w.n,0);return{title:N[Math.floor(Math.random()*N.length)]+'のお願い',wants,coin:10+score*4,star:score>=9?2:1,xp:10+score*3}}
function consume(o){for(let w of o.wants){let n=w.n;for(let j=0;j<S.board.length&&n>0;j++)if(S.board[j]===w.id){S.board[j]=null;n--}}}
function complete(i,auto=false){let o=S.orders[i];if(!o||!can(o))return false;consume(o);S.coins+=o.coin;S.stars+=o.star;addxp(o.xp);S.orders.splice(i,1,order());ensureOrders();sel=null;if(!auto){say(o.title+'を納品したよ！');pop('🚢⭐');if(S.autoStory)autoOpenStory();renderGame();saveSoon()}return true}
function autoDeliver(){let done=0;for(let guard=0;guard<12;guard++){let i=first();if(i<0)break;complete(i,true);done++}if(done){ensureOrders();say('🤖 自動納品 '+done+'件 完了！');pop('🚢⭐')}}
function quick(){let i=first();if(i>=0)complete(i,false);else say('今は納品できる注文がないよ。')}
function sortB(){let a=S.board.filter(Boolean);a.sort((x,y)=>(isGen(x)?-1:0)-(isGen(y)?-1:0)||I[x].k.localeCompare(I[y].k)||lv(x)-lv(y));S.board=[...a,...Array(G-a.length).fill(null)];sel=null;finish('整列したよ。')}
function bonus(){if(Date.now()-S.lastB<BMS){say('ボーナスは少し待ってね。');return}S.lastB=Date.now();S.energy=Math.min(MAX,S.energy+15);finish('エネルギー回復！')}
function sell(){if(sel===null){say('売るアイテムを選んでね。');return}let id=S.board[sel];if(!id||isGen(id)){say('これは売れないよ。');return}S.board[sel]=null;S.coins+=Math.max(1,Math.floor((I[id].price||1)/2));sel=null;finish('売ったよ。')}
function autoOpenStory(){let opened=0;for(let guard=0;guard<ST.length;guard++){let next=S.story+1,s=ST[next];if(!s||S.stars<s.cost)break;if(s.item&&!empty().length)break;S.stars-=s.cost;S.story=next;if(s.coins)S.coins+=s.coins;if(s.energy)S.energy=Math.min(MAX,S.energy+s.energy);if(s.item)add(s.item);opened++;dirtyStory=true}if(opened){say('📖 ストーリーが自動で '+opened+' 話進んだよ！');pop('📖⭐')}}
function storyOpen(i){let s=ST[i];if(!s||i<=S.story||S.stars<s.cost)return;S.stars-=s.cost;S.story=i;if(s.coins)S.coins+=s.coins;if(s.energy)S.energy=Math.min(MAX,S.energy+s.energy);if(s.item)add(s.item);dirtyStory=true;renderAll();saveSoon();pop('📖⭐')}
function setView(v){view=v;document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));$('screen'+v[0].toUpperCase()+v.slice(1)).classList.add('on');document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.go===v));renderAll()}
function statsHtml(){return `<div class='stat'><small>体力</small><b>${S.energy}</b></div><div class='stat'><small>コイン</small><b>${S.coins}</b></div><div class='stat'><small>星</small><b>${S.stars}</b></div><div class='stat'><small>Lv</small><b>${S.level}</b></div><div class='stat'><small>注文</small><b>${S.orders.length}</b></div>`}
function miniStats(){return `<span>⚡${S.energy}</span><span>🪙${S.coins}</span><span>⭐${S.stars}</span><span>Lv${S.level}</span><span>📦${S.orders.length}</span><span>${S.auto?'🤖ON':'手動'}</span>`}
function renderGame(){regen();ensureOrders();$('miniStats').innerHTML=miniStats();$('board').innerHTML=S.board.map((id,i)=>`<button class='cell ${!id?'empty':''} ${id&&isGen(id)?'gen':''} ${sel===i?'sel':''}' data-i='${i}'>${id?`<div class='em'>${emo(id)}</div><div class='nm'>${name(id)}</div>${isGen(id)?'<div class=tap>TAP</div>':`<div class=lv>Lv${lv(id)}</div>`}`:''}</button>`).join('');renderNextOrder();$('sell').disabled=sel===null||!S.board[sel]||isGen(S.board[sel]);$('autoGame').textContent=S.auto?'🤖 ON':'🤖 OFF';$('autoGame').className=S.auto?'good':'off'}
function renderNextOrder(){let f=first(),o=f>=0?S.orders[f]:S.orders[0],c=count();$('quickTop').disabled=f<0;$('nextOrderTitle').textContent=f>=0?'🚢 納品できます':o?o.title:'注文なし';$('nextOrderSub').textContent=f>=0?(S.auto?'自動で納品されます':'ボタンで納品できます'):'注文は常に多めに用意されます';$('nextWants').innerHTML=o?o.wants.map(w=>`<span class='${(c[w.id]||0)>=w.n?'ok':''}'>${emo(w.id)} ${c[w.id]||0}/${w.n}</span>`).join(''):'';let ht=$('homeOrderTitle'),hs=$('homeOrderSub'),hq=$('homeQuick');if(ht){ht.textContent=f>=0?'納品できます':'注文 '+S.orders.length+'件';hs.textContent=f>=0?(S.auto?'自動納品ON':'今すぐ納品できます'):'詰みにくいよう多めに出しています';hq.disabled=f<0}}
function renderOrders(){let el=$('orders');if(!el)return;let c=count();el.innerHTML=S.orders.map((o,i)=>`<div class='order'><div class='ot'><span>${o.title}</span><span>🪙${o.coin} ⭐${o.star}</span></div>${o.wants.map(w=>`<div class='want ${(c[w.id]||0)>=w.n?'ok':'ng'}'><span>${emo(w.id)} ${name(w.id)}</span><span>${c[w.id]||0}/${w.n}</span></div>`).join('')}<button class='${can(o)?'primary':''}' data-o='${i}' ${can(o)?'':'disabled'}>${can(o)?'🚢 納品':'まだ足りない'}</button></div>`).join('')}
function renderStory(){let el=$('storyList');if(!el)return;el.innerHTML=ST.map((s,i)=>{let open=i<=S.story,canOpen=i===S.story+1&&S.stars>=s.cost;return `<div class='storyCard ${open?'':'locked'}'><div class='ot'><span>${open?'📖':'🔒'} ${s.t}</span><span>⭐${s.cost}</span></div><div>${open||canOpen?s.x:'まだ開放されていません。'}</div>${canOpen?`<button class='primary' data-story='${i}'>港を直す</button>`:''}</div>`}).join('')}
function renderBook(){let el=$('book');if(!el)return;el.innerHTML=Object.keys(I).filter(id=>isGen(id)||S.book[id]).map(id=>`<div class='book'><div class='be'>${emo(id)}</div><div>${name(id)}</div><small>${isGen(id)?'発生源':'Lv'+lv(id)}</small></div>`).join('')}
function renderAll(){regen();ensureOrders();['statsHome','statsStory'].forEach(id=>{if($(id))$(id).innerHTML=statsHtml()});renderGame();if(view==='story'||dirtyStory){renderStory();renderOrders();dirtyStory=false}if(view==='story'||dirtyBook){renderBook();dirtyBook=false}$('autoHome').textContent=S.auto?'自動納品 ON':'自動納品 OFF';$('autoHome').className=S.auto?'good':'off';saveSoon()}
function startDrag(i,e){let id=S.board[i];if(!id)return;if(isGen(id)){gen(i);return}drag={from:i,startX:e.clientX,startY:e.clientY,moved:false,target:null,ghost:document.createElement('div')};drag.ghost.className='dragGhost';drag.ghost.textContent=emo(id);document.body.appendChild(drag.ghost);moveGhost(e.clientX,e.clientY);markDrag()}
function moveGhost(x,y){if(!drag)return;drag.ghost.style.transform=`translate(${x-32}px,${y-32}px)`}
function markDrag(){document.querySelectorAll('.cell').forEach(c=>c.classList.remove('dragSource','dropTarget'));if(!drag)return;let s=document.querySelector(`.cell[data-i='${drag.from}']`);if(s)s.classList.add('dragSource');if(drag.target!==null&&drag.target!==drag.from){let t=document.querySelector(`.cell[data-i='${drag.target}']`);if(t)t.classList.add('dropTarget')}}
function targetFromPoint(x,y){let el=document.elementFromPoint(x,y);let cell=el&&el.closest?el.closest('.cell'):null;return cell?+cell.dataset.i:null}
function endDrag(e){if(!drag)return;let dx=e.clientX-drag.startX,dy=e.clientY-drag.startY,moved=Math.hypot(dx,dy)>10,target=targetFromPoint(e.clientX,e.clientY),from=drag.from;drag.ghost.remove();drag=null;document.querySelectorAll('.cell').forEach(c=>c.classList.remove('dragSource','dropTarget'));if(moved&&target!==null){moveOrMerge(from,target)}else{tap(from)}}
$('board').addEventListener('pointerdown',e=>{let b=e.target.closest('.cell');if(!b)return;e.preventDefault();$('board').setPointerCapture&&$('board').setPointerCapture(e.pointerId);startDrag(+b.dataset.i,e)},{passive:false});
$('board').addEventListener('pointermove',e=>{if(!drag)return;e.preventDefault();let dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;if(Math.hypot(dx,dy)>8)drag.moved=true;drag.target=targetFromPoint(e.clientX,e.clientY);moveGhost(e.clientX,e.clientY);markDrag()},{passive:false});
$('board').addEventListener('pointerup',e=>{if(!drag)return;e.preventDefault();endDrag(e)},{passive:false});
$('board').addEventListener('pointercancel',e=>{if(!drag)return;drag.ghost.remove();drag=null;renderGame()},{passive:false});
$('orders').addEventListener('pointerdown',e=>{let b=e.target.closest('button[data-o]');if(!b)return;e.preventDefault();complete(+b.dataset.o,false)},{passive:false});
$('storyList').addEventListener('pointerdown',e=>{let b=e.target.closest('button[data-story]');if(!b)return;e.preventDefault();storyOpen(+b.dataset.story)},{passive:false});
document.body.addEventListener('pointerdown',e=>{let g=e.target.closest('[data-go]');if(!g)return;e.preventDefault();setView(g.dataset.go)},{passive:false});
$('startHome').onpointerdown=e=>{e.preventDefault();setView('home')};$('startGame').onpointerdown=e=>{e.preventDefault();setView('game')};$('quickTop').onpointerdown=e=>{e.preventDefault();quick()};$('homeQuick').onpointerdown=e=>{e.preventDefault();quick()};$('sort').onpointerdown=e=>{e.preventDefault();sortB()};$('bonus').onpointerdown=e=>{e.preventDefault();bonus()};$('sell').onpointerdown=e=>{e.preventDefault();sell()};$('clear').onpointerdown=e=>{e.preventDefault();sel=null;renderGame()};$('autoHome').onpointerdown=$('autoGame').onpointerdown=e=>{e.preventDefault();S.auto=!S.auto;if(S.auto)autoDeliver();renderAll()};$('reset').onpointerdown=e=>{e.preventDefault();if(confirm('最初からやり直しますか？')){localStorage.removeItem(SAVE);localStorage.removeItem('rin_harbor_save_v4');load();setView('opening')}};
setInterval(()=>{regen();renderAll()},20000);load();renderAll();
</script>
</body>
</html>
